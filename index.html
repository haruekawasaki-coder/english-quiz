<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SE試聴ツール（リアル硬貨編）</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Nunito', sans-serif; background: #f5f5f5; color: #333; padding: 20px; max-width: 500px; margin: 0 auto; }
    h1 { font-size: 20px; text-align: center; margin-bottom: 20px; }
    .desc { font-size: 14px; text-align: center; color: #666; margin-bottom: 30px; line-height: 1.6; }
    
    .card { background: #fff; padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .card-title { font-size: 16px; font-weight: 800; margin-bottom: 12px; color: #333; border-bottom: 2px solid #eee; padding-bottom: 8px;}
    
    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    button { flex: 1; padding: 16px 12px; border: none; border-radius: 12px; font-weight: 800; font-size: 15px; cursor: pointer; color: #fff; transition: transform 0.1s; }
    button:active { transform: translateY(3px); }
    
    .btn-ng { background: #FF4B4B; box-shadow: 0 4px 0 #c73434; }
    .btn-next { background: #1CB0F6; box-shadow: 0 4px 0 #0d8fc9; }
    .btn-pt { background: #FFC800; color: #5a3f00; box-shadow: 0 4px 0 #e5b400; display: flex; flex-direction: column; align-items: center; gap: 4px;}
    .btn-pt span { font-size: 11px; opacity: 0.8; font-weight: 700; }
  </style>
</head>
<body>

  <h1>🎵 SE試聴ツール</h1>
  <p class="desc">
    ※スマホのサイレントモードを解除して試聴してください。<br>
    「Pt獲得」のリアルな硬貨音を3種類用意しました。
  </p>

  <div class="card">
    <div class="card-title">✅ 確定済みのSE</div>
    <div class="btn-group">
      <button class="btn-ng" onclick="playNg()">不正解<br><span style="font-size:11px;font-weight:400;">(マイルド)</span></button>
      <button class="btn-next" onclick="playNext()">次へボタン<br><span style="font-size:11px;font-weight:400;">(パキッとポップ)</span></button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💰 Pt獲得（リアル硬貨風）の候補</div>
    <div class="btn-group">
      <button class="btn-pt" onclick="playCoinA()">
        候補 A
        <span>澄んだ高音の1枚</span>
      </button>
      <button class="btn-pt" onclick="playCoinB()">
        候補 B
        <span>チャリンと2枚重なる</span>
      </button>
      <button class="btn-pt" onclick="playCoinC()">
        候補 C
        <span>500円玉のような重み</span>
      </button>
    </div>
  </div>

  <script>
    let ctx; 

    // オーディオ初期化（自動再生ブロック回避）
    function initAudio() {
      if (!ctx) {
        ctx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (ctx.state === 'suspended') {
        ctx.resume();
      }
    }

    // 基本のトーン生成関数
    function createTone(freq, type, startTime, duration, volStart, volEnd) {
      initAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime + startTime);
      gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
      gain.gain.linearRampToValueAtTime(volStart, ctx.currentTime + startTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(volEnd, ctx.currentTime + startTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + startTime);
      osc.stop(ctx.currentTime + startTime + duration);
    }

    // 確定済みの不正解（マイルド＆癒やし系）
    function playNg() {
      createTone(300, 'sine', 0, 0.3, 0.15, 0.01);
      createTone(250, 'sine', 0.15, 0.4, 0.15, 0.01);
    }

    // 確定済みの次へ（パキッとしたポップな三角波）
    function playNext() {
      createTone(880, 'triangle', 0, 0.08, 0.15, 0.01);
      createTone(1318.51, 'triangle', 0.06, 0.12, 0.15, 0.01);
    }

    /* ----------------------------------------------------
       ここから「リアル硬貨」をシミュレートする専用関数
       金属音＝複数の高い周波数のサイン波を重ねて鋭く減衰させる
    ----------------------------------------------------- */
    function playMetallicTone(freq, startTime, duration) {
      initAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine'; // サイン波の重ね合わせで金属の共鳴を作る
      osc.frequency.setValueAtTime(freq, ctx.currentTime + startTime);
      
      // 金属特有の「アタックが強く、すぐに消える」設定
      gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
      gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + startTime + 0.01); // 0.01秒で最大音量
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startTime + duration);
      
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + startTime);
      osc.stop(ctx.currentTime + startTime + duration);
    }

    // 候補A：澄んだ高いベル・コイン音（100円玉が落ちたような音）
    function playCoinA() {
      playMetallicTone(2000, 0, 0.4);
      playMetallicTone(2000 * 2.76, 0, 0.3); // 金属特有の不規則な倍音
      playMetallicTone(2000 * 5.4, 0, 0.2);
    }

    // 候補B：複数のコインが「チャリン」とぶつかる音（一番リアル寄り）
    function playCoinB() {
      // 1枚目の音
      playMetallicTone(2500, 0, 0.3);
      playMetallicTone(2500 * 2.1, 0, 0.2);
      // ほんの少し遅れて2枚目がぶつかる音
      playMetallicTone(2800, 0.05, 0.3);
      playMetallicTone(2800 * 2.1, 0.05, 0.2);
    }

    // 候補C：少し重みのある硬貨（500円玉のようなジャラッとした音）
    function playCoinC() {
      playMetallicTone(1200, 0, 0.5);
      playMetallicTone(1200 * 2.5, 0, 0.4);
      playMetallicTone(1200 * 4.2, 0, 0.3);
      
      playMetallicTone(1500, 0.08, 0.4);
      playMetallicTone(1500 * 2.5, 0.08, 0.3);
    }
  </script>
</body>
</html>
