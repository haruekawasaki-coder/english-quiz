<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SE試聴ツール（究極の選択編）</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Nunito', sans-serif; background: #f5f5f5; color: #333; padding: 20px; max-width: 500px; margin: 0 auto; padding-bottom: 50px; }
    h1 { font-size: 20px; text-align: center; margin-bottom: 20px; }
    .desc { font-size: 14px; text-align: center; color: #666; margin-bottom: 30px; line-height: 1.6; }
    
    .card { background: #fff; padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .card-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; color: #333; border-bottom: 2px solid #eee; padding-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-full { grid-column: span 2; }

    button { padding: 16px 12px; border: none; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; color: #fff; transition: transform 0.1s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
    button:active { transform: translateY(3px); }
    button span { font-size: 11px; opacity: 0.9; font-weight: 600; text-align: center; line-height: 1.3; }
    
    .btn-pt { background: #FFC800; color: #5a3f00; box-shadow: 0 4px 0 #e5b400; }
    .btn-ng { background: #FF4B4B; box-shadow: 0 4px 0 #c73434; }
    .btn-next { background: #1CB0F6; box-shadow: 0 4px 0 #0d8fc9; }
  </style>
</head>
<body>

  <h1>🎵 SE試聴ツール（究極の選択編）</h1>
  <p class="desc">
    ※スマホのサイレントモードを解除して試聴してください。
  </p>

  <div class="card">
    <div class="card-title">💰 Pt獲得（確定）</div>
    <div class="grid">
      <button class="btn-pt grid-full" onclick="playCoinDoubleA()">
        完成版コイン音
        <span>「候補A」の2枚重ねチャリーン！</span>
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">❌ 不正解の候補（5種類）</div>
    <div class="grid">
      <button class="btn-ng" onclick="playNg1()">候補 1<span>マイルド<br>(前回の癒やし系)</span></button>
      <button class="btn-ng" onclick="playNg2()">候補 2<span>ポコンッ<br>(木琴のような短い音)</span></button>
      <button class="btn-ng" onclick="playNg3()">候補 3<span>シュン…<br>(コミカルに下がる音)</span></button>
      <button class="btn-ng" onclick="playNg4()">候補 4<span>ブー<br>(少し不協和音で警告)</span></button>
      <button class="btn-ng" onclick="playNg5()">候補 5<span>ボフッ<br>(低くて丸い鈍い音)</span></button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">⏩ 次へボタンの候補（5種類）</div>
    <div class="grid">
      <button class="btn-next" onclick="playNext1()">候補 1<span>ティロン↑<br>(前回のパキッとポップ)</span></button>
      <button class="btn-next" onclick="playNext2()">候補 2<span>ポッ<br>(水滴のようなUIタップ)</span></button>
      <button class="btn-next" onclick="playNext3()">候補 3<span>ピロ<br>(素早く上がる小気味いい音)</span></button>
      <button class="btn-next" onclick="playNext4()">候補 4<span>カチッ<br>(スタイリッシュなメカ音)</span></button>
      <button class="btn-next" onclick="playNext5()">候補 5<span>チリン<br>(小さなガラス系の高音)</span></button>
    </div>
  </div>

  <script>
    let ctx; 

    function initAudio() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === 'suspended') ctx.resume();
    }

    function createTone(freq, type, startTime, duration, volStart, volEnd) {
      initAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime + startTime);
      gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
      gain.gain.linearRampToValueAtTime(volStart, ctx.currentTime + startTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(volEnd, ctx.currentTime + startTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + startTime);
      osc.stop(ctx.currentTime + startTime + duration);
    }

    function playMetallicTone(freq, startTime, duration) {
      initAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + startTime);
      gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
      gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + startTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + startTime);
      osc.stop(ctx.currentTime + startTime + duration);
    }

    // 💰 完成版 Pt獲得（候補Aの2枚重ね）
    function playCoinDoubleA() {
      // 1枚目
      playMetallicTone(2000, 0, 0.4);
      playMetallicTone(2000 * 2.76, 0, 0.3);
      playMetallicTone(2000 * 5.4, 0, 0.2);
      // 2枚目（ちょっと高い音を0.06秒遅らせて鳴らす）
      playMetallicTone(2200, 0.06, 0.4);
      playMetallicTone(2200 * 2.76, 0.06, 0.3);
      playMetallicTone(2200 * 5.4, 0.06, 0.2);
    }

    // ❌ 不正解の候補たち
    function playNg1() { // マイルド（前回）
      createTone(300, 'sine', 0, 0.3, 0.15, 0.01);
      createTone(250, 'sine', 0.15, 0.4, 0.15, 0.01);
    }
    function playNg2() { // 木琴のようなポコン
      createTone(350, 'sine', 0, 0.1, 0.3, 0.001);
      createTone(150, 'sine', 0, 0.1, 0.3, 0.001);
    }
    function playNg3() { // コミカル下降（3音）
      createTone(350, 'sine', 0, 0.15, 0.1, 0.01);
      createTone(280, 'sine', 0.1, 0.15, 0.1, 0.01);
      createTone(200, 'sine', 0.2, 0.2, 0.1, 0.01);
    }
    function playNg4() { // 不協和音のブー
      createTone(200, 'triangle', 0, 0.3, 0.1, 0.01);
      createTone(215, 'triangle', 0, 0.3, 0.1, 0.01);
    }
    function playNg5() { // 低くて丸い鈍い音
      createTone(150, 'square', 0, 0.2, 0.05, 0.01);
      createTone(120, 'square', 0.15, 0.3, 0.05, 0.01);
    }

    // ⏩ 次への候補たち
    function playNext1() { // ティロン↑（前回のパキッとポップ）
      createTone(880, 'triangle', 0, 0.08, 0.15, 0.01);
      createTone(1318.51, 'triangle', 0.06, 0.12, 0.15, 0.01);
    }
    function playNext2() { // 水滴ポッ
      createTone(600, 'sine', 0, 0.1, 0.2, 0.001);
    }
    function playNext3() { // ピロ（素早く上がる）
      createTone(400, 'sine', 0, 0.05, 0.1, 0.01);
      createTone(600, 'sine', 0.05, 0.1, 0.1, 0.01);
    }
    function playNext4() { // カチカチ（メカニカル）
      createTone(1000, 'square', 0, 0.03, 0.05, 0.001);
      createTone(1200, 'square', 0.05, 0.03, 0.05, 0.001);
    }
    function playNext5() { // ガラス系高音
      createTone(1500, 'sine', 0, 0.2, 0.1, 0.001);
      createTone(2000, 'sine', 0, 0.2, 0.05, 0.001);
    }
  </script>
</body>
</html>
