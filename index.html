<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>English Quiz (スピーキング＆図鑑フル搭載版)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --green:#58CC02;--gd:#46a302;--gpale:#d7f5b1;
      --blue:#1CB0F6;--bd:#0d8fc9;
      --red:#FF4B4B;--rd:#c73434;
      --yellow:#FFC800;--yd:#e5b400;
      --bg:#F5F5F5;--card:#FFF;--text:#2D2D2D;
      --muted:#888;--border:#E5E5E5;--r:16px;
    }
    html,body{height:100%;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);touch-action:manipulation;}
    #root{height:100%;}
    .app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;}
    
    /* Header */
    .top-header{background:var(--card);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;flex-shrink:0;}
    .pts-badge{display:flex;align-items:center;gap:6px;font-size:16px;font-weight:900;color:var(--yellow);}
    
    /* Nav */
    .nav{background:var(--card);border-top:2px solid var(--border);display:flex;position:sticky;bottom:0;z-index:100;flex-shrink:0;}
    .ntab{flex:1;padding:12px 2px 10px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:10px;font-weight:800;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;border-top:3px solid transparent;transition:all .2s;-webkit-tap-highlight-color:transparent;}
    .ntab.on{color:var(--blue);border-top-color:var(--blue);}
    .badge-red{background:#ffe5e5;color:var(--rd);border-radius:99px;padding:1px 7px;font-size:9px;font-weight:900;}

    /* Map UI */
    .map-container{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:40px 0 80px;background:#f0f5f0;position:relative;}
    .map-path{display:flex;flex-direction:column-reverse;align-items:center;gap:40px;position:relative;width:100%;margin-top:20px;}
    .map-line{position:absolute;top:30px;bottom:30px;width:12px;background:var(--border);left:50%;transform:translateX(-50%);z-index:1;border-radius:10px;}
    .map-line-fill{position:absolute;bottom:0;width:100%;background:var(--green);border-radius:10px;transition:height 1s ease;}
    .node-wrap{position:relative;z-index:2;display:flex;justify-content:center;width:100%;}
    .map-node{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;cursor:pointer;border:4px solid #fff;transition:transform .2s;-webkit-tap-highlight-color:transparent;}
    .map-node.locked{background:#e5e5e5;color:#bbb;}
    .map-node.cleared{background:var(--green);color:#fff;box-shadow:0 6px 0 var(--gd);}
    .map-node.current{background:var(--yellow);color:#fff;box-shadow:0 6px 0 var(--yd);animation:float 2s infinite ease-in-out;transform:scale(1.15);}
    .map-node.weak{background:var(--red);color:#fff;box-shadow:0 6px 0 var(--rd);animation:float 2s infinite ease-in-out;transform:scale(1.15);}
    .map-start-btn{position:absolute;top:-50px;background:#fff;border:2px solid var(--border);padding:8px 16px;border-radius:12px;font-size:14px;font-weight:900;color:var(--blue);box-shadow:0 4px 12px rgba(0,0,0,.1);animation:popIn .3s cubic-bezier(.175,.885,.32,1.275);white-space:nowrap;}
    .map-start-btn::after{content:"";position:absolute;bottom:-6px;left:50%;transform:translateX(-50%) rotate(45deg);width:10px;height:10px;background:#fff;border-right:2px solid var(--border);border-bottom:2px solid var(--border);}
    .floating-char{position:absolute;width:60px;height:60px;object-fit:contain;animation:floatChar 4s infinite ease-in-out alternate;z-index:1;opacity:0.9;}
    @keyframes floatChar{0%{transform:translateY(0) rotate(-5deg)}100%{transform:translateY(-15px) rotate(5deg)}}
    @keyframes float{0%,100%{transform:scale(1.15) translateY(0)}50%{transform:scale(1.15) translateY(-6px)}}
    @keyframes popIn{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}

    /* Quiz Area */
    .bdots{display:flex;gap:6px;justify-content:center;padding:10px 16px 4px;}
    .bdot{width:11px;height:11px;border-radius:50%;background:var(--border);transition:background .25s,transform .25s;}
    .bdot.ok{background:var(--green);}
    .bdot.ng{background:var(--red);}
    .bdot.cur{background:var(--blue);transform:scale(1.3);}
    .qcard{margin:10px 16px 10px;background:var(--card);border-radius:var(--r);border:2px solid var(--border);box-shadow:0 5px 0 var(--border);padding:20px 18px 16px;}
    .qbadge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;border-radius:99px;padding:3px 12px;margin-bottom:10px;}
    .qbadge.mc{background:#d7f5b1;color:#3a9100;}
    .qbadge.fb{background:#ddeeff;color:var(--bd);}
    .qbadge.mm{background:#f0e0ff;color:#9340c8;}
    .qbadge.ls{background:#fff3cd;color:#8a6200;}
    .qbadge.ex{background:#ffe4e4;color:#c73434;}
    .qbadge.wr{background:#e0f7fa;color:#006064;}
    .qquestion{font-size:15px;font-weight:700;margin-bottom:8px;line-height:1.5;}
    .qphrase{font-size:23px;font-weight:900;margin:4px 0 6px;line-height:1.25;}
    .blank-box{font-size:18px;font-weight:800;background:#f0f0f0;border-radius:10px;padding:10px 14px;margin:4px 0 6px;line-height:1.5;}
    .sub-info{margin-top:8px;padding:10px 13px;background:#f7f7f7;border-radius:10px;font-size:13px;font-weight:700;color:var(--gd);line-height:1.5;}
    .mhint{margin-top:6px;padding:11px 14px;background:#f7f7f7;border-radius:12px;font-size:15px;font-weight:700;line-height:1.65;color:#222;}
    .ex-sentence{margin-top:6px;padding:12px 14px;background:#fff5f0;border:2px solid #ffd6c0;border-radius:12px;font-size:15px;font-weight:700;line-height:1.65;}
    .ex-ja{margin-top:5px;font-size:12px;color:var(--muted);font-style:italic;line-height:1.55;}
    
    .speak-btn{display:flex;align-items:center;justify-content:center;gap:10px;margin:12px auto 0;width:85%;padding:16px;border:3px solid var(--yellow);border-radius:var(--r);background:#fffbf0;cursor:pointer;font-family:inherit;font-size:15px;font-weight:800;color:#8a6200;box-shadow:0 4px 0 var(--yd);-webkit-tap-highlight-color:transparent;transition:transform .12s,box-shadow .12s;}
    .speak-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--yd);}
    .speak-btn.playing{background:var(--yellow);animation:spulse 1s infinite;}
    @keyframes spulse{0%,100%{box-shadow:0 4px 0 var(--yd)}50%{box-shadow:0 4px 0 var(--yd),0 0 0 8px rgba(255,200,0,.22)}}

    .mini-speak{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:#e5f6fd;color:var(--bd);border:1px solid #b3e5fc;cursor:pointer;margin-left:8px;vertical-align:middle;transition:background .2s, transform .1s;-webkit-tap-highlight-color:transparent;}
    .mini-speak:active{transform:scale(0.9);}
    .mini-speak.playing{background:var(--blue);color:#fff;animation:spin 1.5s linear infinite;}
    
    .opts{display:flex;flex-direction:column;gap:8px;margin:8px 16px 0;}
    .opt{border:2.5px solid var(--border);border-radius:var(--r);padding:13px 18px;background:var(--card);font-family:inherit;font-size:15px;font-weight:700;color:var(--text);cursor:pointer;text-align:left;transition:border-color .15s,background .15s;box-shadow:0 3px 0 var(--border);-webkit-tap-highlight-color:transparent;outline:none;}
    .opt.ok{border-color:var(--green)!important;background:var(--gpale)!important;color:var(--gd)!important;box-shadow:0 3px 0 var(--gd)!important;}
    .opt.ng{border-color:var(--red)!important;background:#ffe5e5!important;color:var(--rd)!important;box-shadow:0 3px 0 var(--rd)!important;animation:shake .3s;}
    .opt:disabled{cursor:default;}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    
    .write-form{display:flex;flex-direction:column;gap:10px;margin:8px 16px 0;}
    .write-input{flex:1;border:2.5px solid var(--border);border-radius:12px;padding:14px 16px;font-size:16px;font-weight:700;font-family:inherit;color:var(--text);outline:none;box-shadow:0 3px 0 var(--border);transition:border-color .15s;resize:vertical;min-height:80px;}
    .write-input:focus{border-color:var(--blue);}
    .write-input:disabled{background:#eef1f5;color:var(--muted);border-color:#d5d9e0;box-shadow:none;}
    .btn-submit-write{border:none;border-radius:12px;padding:14px 24px;font-family:inherit;font-size:15px;font-weight:800;background:var(--blue);color:#fff;cursor:pointer;box-shadow:0 4px 0 var(--bd);transition:transform .1s,box-shadow .1s;-webkit-tap-highlight-color:transparent;}
    .btn-submit-write:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 var(--bd);}
    .btn-submit-write:disabled{background:var(--border);box-shadow:none;cursor:default;}

    .skip-btn{background:none;border:2px solid var(--border);border-radius:12px;padding:10px;font-family:inherit;font-size:14px;font-weight:800;color:var(--muted);cursor:pointer;margin:0 16px;display:flex;align-items:center;justify-content:center;gap:6px;}

    /* Feedback */
    .fdbk{margin:10px 16px 0;border-radius:var(--r);padding:13px 16px;border:2px solid;animation:sup .28s cubic-bezier(.34,1.56,.64,1);}
    .fdbk.ok{background:var(--gpale);border-color:var(--green);}
    .fdbk.ng{background:#ffe5e5;border-color:var(--red);}
    .fdbk-ttl{font-size:15px;font-weight:900;display:flex;align-items:center;gap:6px;margin-bottom:5px;}
    .fdbk.ok .fdbk-ttl{color:var(--gd);}
    .fdbk.ng .fdbk-ttl{color:var(--rd);}
    .fdbk-body{font-size:14px;line-height:1.65;color:#111;}
    .fdbk-ex{margin-top:8px;font-size:13px;color:#333;font-weight:600;line-height:1.6;border-top:1.5px dashed rgba(0,0,0,.12);padding-top:8px;}
    @keyframes sup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    
    .btns{padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
    .btn{border:none;border-radius:var(--r);padding:15px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;transition:transform .12s,box-shadow .12s;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;}
    .btn-next{background:var(--green);color:#fff;box-shadow:0 4px 0 var(--gd);}
    .btn-next:active{transform:translateY(2px);box-shadow:0 2px 0 var(--gd);}
    .btn-result{background:var(--blue);color:#fff;box-shadow:0 4px 0 var(--bd);}
    .btn-result:active{transform:translateY(2px);box-shadow:0 2px 0 var(--bd);}
    .btn-master{background:var(--yellow);color:#5a3f00;box-shadow:0 4px 0 var(--yd);}
    .btn-master:active{transform:translateY(2px);box-shadow:0 2px 0 var(--yd);}
    
    /* Shop & Collection */
    .shop-item{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:16px;margin-bottom:12px;box-shadow:0 4px 0 var(--border);}
    .shop-icon{font-size:32px;background:#f0f5f0;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
    .shop-info{flex:1;}
    .shop-name{font-size:16px;font-weight:800;margin-bottom:4px;}
    .shop-price{font-size:14px;font-weight:900;color:var(--yellow);display:flex;align-items:center;gap:4px;}
    .btn-buy{background:var(--blue);color:#fff;border:none;padding:10px 16px;border-radius:12px;font-weight:800;font-size:14px;box-shadow:0 4px 0 var(--bd);cursor:pointer;}
    .btn-buy:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 var(--bd);}
    .btn-buy:disabled{background:#ccc;box-shadow:0 4px 0 #aaa;}

    .col-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px;}
    .col-item{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;text-align:center;}
    .col-img{width:70px;height:70px;object-fit:contain;margin-bottom:8px;}
    .col-img.locked{filter:brightness(0) invert(0.8);}
    .col-name{font-size:11px;font-weight:800;color:#333;margin-bottom:4px;height:28px;display:flex;align-items:center;}
    .col-count{font-size:10px;color:var(--muted);font-weight:700;}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
    .modal-content{background:#fff;border-radius:24px;padding:30px 24px;width:100%;max-width:380px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.2);animation:sup .3s cubic-bezier(.34,1.56,.64,1);}
    
    .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-120px);background:#1a1a1a;color:#fff;padding:12px 22px;border-radius:99px;font-size:14px;font-weight:700;z-index:9999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;opacity:0;}
    .toast.on{transform:translateX(-50%) translateY(0);opacity:1;}
    .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    @keyframes cfFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(250px) rotate(720deg)}}
    .yeastken-img{width:160px;height:160px;object-fit:contain;margin:10px 0;animation:floatChar 2s infinite ease-in-out alternate;}
  </style>
</head>

let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function unlockAudio() {
  try {
    const ctx = initAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    gain.gain.value = 0;
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(0); osc.stop(ctx.currentTime + 0.001);
    document.removeEventListener('pointerdown', unlockAudio);
    document.removeEventListener('touchstart', unlockAudio);
  } catch(e) {}
}

function createTone(freq, type, startTime, duration, volStart, volEnd) {
  try {
    const ctx = initAudio();
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime + startTime);
    gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
    gain.gain.linearRampToValueAtTime(volStart, ctx.currentTime + startTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(volEnd, ctx.currentTime + startTime + duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime + startTime); osc.stop(ctx.currentTime + startTime + duration);
  } catch(e) {}
}

function createSlideTone(freqStart, freqEnd, type, startTime, duration, volStart, volEnd) {
  try {
    const ctx = initAudio();
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freqStart, ctx.currentTime + startTime);
    osc.frequency.exponentialRampToValueAtTime(freqEnd, ctx.currentTime + startTime + duration);
    gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
    gain.gain.linearRampToValueAtTime(volStart, ctx.currentTime + startTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(volEnd, ctx.currentTime + startTime + duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime + startTime); osc.stop(ctx.currentTime + startTime + duration);
  } catch(e) {}
}

function playPtSE() {
  if (navigator.vibrate) navigator.vibrate([60, 50, 60]);
  const mt = (f,s,d) => {
    try {
      const ctx = initAudio(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(f, ctx.currentTime + s);
      gain.gain.setValueAtTime(0, ctx.currentTime + s);
      gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + s + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + s + d);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + s); osc.stop(ctx.currentTime + s + d);
    } catch(e) {}
  };
  mt(2000, 0, 0.4); mt(2000*2.76, 0, 0.3); mt(2000*5.4, 0, 0.2);
  mt(2200, 0.06, 0.4); mt(2200*2.76, 0.06, 0.3); mt(2200*5.4, 0.06, 0.2);
}

function playNgSE() {
  createTone(350, 'sine', 0, 0.1, 0.3, 0.001);
  createTone(200, 'sine', 0.03, 0.1, 0.3, 0.001);

function speakText(text, onEnd) {
  if (!window.speechSynthesis) { onEnd?.(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const isJapanese = /[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF]/.test(text);
  u.lang = isJapanese ? "ja-JP" : "en-US"; u.rate = 0.82;
  if (onEnd) u.onend = onEnd;
  const go = () => {
    const v = window.speechSynthesis.getVoices();
    const targetVoice = v.find(x => x.lang.startsWith(isJapanese ? "ja" : "en-US")) || v.find(x => x.lang.startsWith(isJapanese ? "ja" : "en"));
    if (targetVoice) u.voice = targetVoice;
    window.speechSynthesis.speak(u);
  };
  window.speechSynthesis.getVoices().length ? go() : (window.speechSynthesis.onvoiceschanged = go);
}

function Ring({ pct, size=50, stroke=5, color="#58CC02" }) {
  const r=size/2-stroke, circ=2*Math.PI*r, off=circ-(pct/100)*circ;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E5E5" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
        style={{transition:"stroke-dashoffset .7s ease"}}/>
    </svg>
  );
}

const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

function buildOptions(correct, pool) {
  const seen = new Set([correct]); const opts = [correct];
  for (const c of shuffle(pool)) {
    if (!seen.has(c) && opts.length < 4) { seen.add(c); opts.push(c); }
    if (opts.length === 4) break;
  }
  return shuffle(opts);
}

const formatOpt = (str) => {
  let s = str.toLowerCase();
  s = s.replace(/\bi\b/g, 'I'); s = s.replace(/\bi'm\b/g, "I'm");
  s = s.replace(/\bi've\b/g, "I've"); s = s.replace(/\bi'll\b/g, "I'll"); s = s.replace(/\bi'd\b/g, "I'd");
  return s;
};

function extractDynamicPhrase(phrase, sentence) {
  const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const getFuzzyPat = (w) => {
    let pat = escapeRegExp(w);
    if (w.length >= 4) pat = escapeRegExp(w.slice(0, 3)) + "[a-z]{0,5}";
    else if (w.length === 3) pat = escapeRegExp(w.slice(0, 2)) + "[a-z]{0,4}";
    else pat = escapeRegExp(w) + "[a-z]{0,2}";
    return "\\b" + pat + "\\b";
  };
  const words = phrase.split(/\s+/).filter(w => w.length > 0);
  const presentWords = [];
  words.forEach(w => { if (new RegExp(getFuzzyPat(w), "ig").test(sentence)) presentWords.push(w); });
  if (presentWords.length === 0) return phrase;
  if (presentWords.length === 1) { const match = new RegExp(getFuzzyPat(presentWords[0]), "ig").exec(sentence); return match ? match[0] : phrase; }

  const firstPat = new RegExp(getFuzzyPat(presentWords[0]), "ig");
  const lastPat = new RegExp(getFuzzyPat(presentWords[presentWords.length - 1]), "ig");

  let firstMatches = []; let m;
  while ((m = firstPat.exec(sentence)) !== null) firstMatches.push({ start: m.index, end: m.index + m[0].length });
  let lastMatches = [];
  while ((m = lastPat.exec(sentence)) !== null) lastMatches.push({ start: m.index, end: m.index + m[0].length });

  let bestSpan = null; let minDist = Infinity;
  firstMatches.forEach(f => {
    lastMatches.forEach(l => {
      if (l.end > f.start) {
        const dist = l.end - f.start;
        if (dist < minDist) { minDist = dist; bestSpan = sentence.substring(f.start, l.end); }
      }
    });
  });
  if (bestSpan && minDist < 150) return bestSpan;
  return phrase;
}

function generateQuiz(expression, all, excludeTypes=[]) {
  const others = all.filter(e => e.id !== expression.id);
  const acc = expression.attempts > 0 ? (expression.correctCount / expression.attempts) * 100 : 0;
  
  let types = ["multiple_choice","fill_blank","meaning_match","listening","example_blank"];
  if (acc >= 60) types.push("writing", "speaking", "original_writing");

  types = types.filter(t => !excludeTypes.includes(t));
  if(types.length === 0) types = ["multiple_choice"];

  const type = types[Math.floor(Math.random() * types.length)];

  if (type === "multiple_choice") {
    const correct = expression.meaning.split("・")[0].split("。")[0];
    return { type, question:`"${expression.phrase}" の意味は？`, options: buildOptions(correct, others.map(e=>e.meaning.split("・")[0].split("。")[0])), answer: correct, expression };
  }
  if (type === "fill_blank") {
    const words = expression.phrase.split(" ");
    const bi    = Math.floor(Math.random() * words.length);
    const ansFmt = formatOpt(words[bi]);
    return { type, question:"空欄に入る単語を選んでください", phrase: words.map((w,i) => i===bi ? "【  】" : w).join(" "), subInfo:`💡 意味：${expression.meaning.split("。")[0]}`, options: buildOptions(ansFmt, others.flatMap(e=>e.phrase.split(" ").map(w=>formatOpt(w)))), answer: ansFmt, expression };
  }
  if (type === "meaning_match") {
    const ansFmt = formatOpt(expression.phrase);
    return { type, question:"次の意味に合う英語表現はどれ？", meaningHint: expression.meaning.split("。")[0], options: buildOptions(ansFmt, others.map(e=>formatOpt(e.phrase))), answer: ansFmt, expression };
  }
  if (type === "listening") {
    const ansFmt = formatOpt(expression.phrase);
    return { type, question:"🎧 音声を聞いて、正しい英語表現を選んでください", options: buildOptions(ansFmt, others.map(e=>formatOpt(e.phrase))), answer: ansFmt, expression };
  }
  if (type === "writing") {
    return { type, question:"✍️ 次の意味を表す英語フレーズをタイピングしてください", meaningHint: expression.meaning.split("。")[0], answer: expression.phrase, expression };
  }
  if (type === "speaking") {
    return { type, question:"🗣️ 例文を声に出して読んでみましょう", meaningHint: expression.meaning.split("。")[0], expression };
  }
  if (type === "original_writing") {
    return { type, question:"📝 この表現を使って、自分なりの英文を作成してみましょう", meaningHint: expression.meaning.split("。")[0], expression };
  }
  
  const dynPhrase = extractDynamicPhrase(expression.phrase, expression.example);
  const ansFmt = formatOpt(dynPhrase);
  const escapeRegExp = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const blanked = expression.example.replace(new RegExp(escapeRegExp(dynPhrase), "i"), "【    】");
  
  return { 
    type:"example_blank", question:"例文の【    】に入るフレーズは？", exampleBlanked: blanked, exampleJa: expression.exampleJa, options: buildOptions(ansFmt, others.map(e=>formatOpt(e.phrase))), answer: ansFmt, expression 
  };
}

function App() {
  const [loaded,        setLoaded]        = useState(false);
  const [gasError,      setGasError]      = useState(false);
  const [tab,           setTab]           = useState("home"); 
  const [exprs,         setExprs]         = useState([]);
  const [quiz,          setQuiz]          = useState(null);
  const [selected,      setSelected]      = useState(null);
  const [isCorrect,     setIsCorrect]     = useState(null);
  const [showFB,        setShowFB]        = useState(false);
  const [playing,       setPlaying]       = useState(false);
  const [confetti,      setConfetti]      = useState(false);
  const [toast,         setToast]         = useState({ msg:"", on:false });
  const [batch,         setBatch]         = useState([]);
  const [showBatch,     setShowBatch]     = useState(false);
  
  const [points,        setPoints]        = useState(0);
  const [normalStage,   setNormalStage]   = useState(1);
  const [inputVal,      setInputVal]      = useState("");
  
  const [showSelfCheck, setShowSelfCheck] = useState(false);

  const [unlockedChars, setUnlockedChars] = useState([]);
  const [charCounts,    setCharCounts]    = useState({});
  const [loginBonusChar,setLoginBonusChar]= useState(null);

  const exprsRef = useRef(exprs);
  exprsRef.current = exprs;

  useEffect(() => {
    document.addEventListener('pointerdown', unlockAudio);
    document.addEventListener('touchstart', unlockAudio);

    setPoints(lsGet(LS_POINTS, 0));
    setNormalStage(lsGet(LS_STAGE, 1));
    const savedChars = lsGet(LS_CHARS, []);
    setUnlockedChars(savedChars);
    setCharCounts(lsGet(LS_COUNTS, {}));

    const today = new Date().toDateString();
    const lastLogin = lsGet(LS_LOGIN, null);
    if (today !== lastLogin) {
      lsSet(LS_LOGIN, today);
      const locked = CHARACTERS.filter(c => !savedChars.includes(c.id));
      if (locked.length > 0) {
        const lucky = locked[Math.floor(Math.random() * locked.length)];
        setLoginBonusChar(lucky);
        const newUnlocked = [...savedChars, lucky.id];
        setUnlockedChars(newUnlocked);
        lsSet(LS_CHARS, newUnlocked);
      } else {
        setLoginBonusChar(null);
        setPoints(p => { const np = p+100; lsSet(LS_POINTS, np); return np; });
      }
    }

    gasGet({ action:"getExpressions" })
      .then(({ expressions }) => {
        const data = (expressions && expressions.length) ? expressions : (lsGet(LS_EXPRS) || DUMMY);
        setExprs(data); lsSet(LS_EXPRS, data); setLoaded(true);
      })
      .catch(() => {
        setGasError(true); setExprs(lsGet(LS_EXPRS) || DUMMY); setLoaded(true);
      });

    return () => { document.removeEventListener('pointerdown', unlockAudio); document.removeEventListener('touchstart', unlockAudio); }
  }, []);

  useEffect(() => { if (exprs.length) lsSet(LS_EXPRS, exprs); }, [exprs]);

  const pickQuiz = useCallback((list, targetTab, exclude=[]) => {
    const isW = targetTab === "weak_quiz";
    const pool = isW ? list.filter(e => e.status !== "習得済み" && e.attempts > 0 && (e.correctCount / e.attempts) < 0.7) : list.filter(e => e.status !== "習得済み");
    if (!pool.length) { setQuiz(null); return; }
    const expr = pool[Math.floor(Math.random() * pool.length)];
    setQuiz(generateQuiz(expr, list, exclude));
    setSelected(null); setIsCorrect(null); setShowFB(false); setPlaying(false); setInputVal(""); setShowSelfCheck(false);
  }, []);

  function showToast(msg) {
    setToast({ msg, on:true }); setTimeout(()=>setToast(t=>({...t,on:false})), 2200);
  }

  function startSession(mode) {
    setBatch([]); setTab(mode); pickQuiz(exprsRef.current, mode);
  }

  function handleSelfGrade(correct) {
    if (correct) {
      playOkSE(); setConfetti(true); setTimeout(()=>setConfetti(false),1300);
    } else {
      playNgSE();
    }
    setSelected("self-graded"); setIsCorrect(correct); setShowFB(true);

    const newExprs = exprs.map(e => {
      if (e.id!==quiz.expression.id) return e;
      return { ...e, attempts: e.attempts+1, correctCount: e.correctCount+(correct?1:0), status: e.status==="未学習"&&correct ? "学習中" : e.status };
    });
    setExprs(newExprs);
    gasPost("updateStats", { phrase:quiz.expression.phrase, correct }).catch(()=>{});
    setBatch([...batch, { expressionId:quiz.expression.id, correct }]);
  }

  function handleSkipSpeaking() {
    pickQuiz(exprsRef.current, tab, ["speaking"]);
  }

  function handleAnswer(option) {
    if (selected || !quiz) return;

    const isWrite = quiz.type === "writing";
    const normalize = (str) => str.replace(/[.,?!]/g, '').trim().toLowerCase();
    
    const userAns = isWrite ? normalize(option) : option.toLowerCase();
    const rightAns = isWrite ? normalize(quiz.answer) : quiz.answer.toLowerCase();
    const correct = userAns === rightAns;

    if (correct) {
      playOkSE();
      const isJapanese = /[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF]/.test(option);
      if (!isJapanese && !isWrite) setTimeout(() => speakText(option), 200);
      setConfetti(true); setTimeout(()=>setConfetti(false),1300);
    } else {
      playNgSE();
    }

    setSelected(option); setIsCorrect(correct); setShowFB(true);

    const newExprs = exprs.map(e => {
      if (e.id!==quiz.expression.id) return e;
      return { ...e, attempts: e.attempts+1, correctCount: e.correctCount+(correct?1:0), status: e.status==="未学習"&&correct ? "学習中" : e.status };
    });
    setExprs(newExprs);
    gasPost("updateStats", { phrase:quiz.expression.phrase, correct }).catch(()=>{});
    setBatch([...batch, { expressionId:quiz.expression.id, correct }]);
  }

  function handleNext() {
    playNextSE();
    if (batch.length >= BATCH_SIZE) setShowBatch(true);
    else pickQuiz(exprsRef.current, tab);
  }

  function handleQuitQuiz() {
    if (window.confirm("本当に中断して戻りますか？\n（このセットの途中の進捗はリセットされます）")) {
      setBatch([]);
      setTab(tab === "weak_quiz" ? "weak_home" : "home");
    }
  }

  function handleBatchContinue(earnedPts) {
    const newPts = points + earnedPts;
    setPoints(newPts); lsSet(LS_POINTS, newPts); setShowBatch(false); setBatch([]);
    if (tab === "quiz") {
      const nextStage = normalStage + 1;
      setNormalStage(nextStage); lsSet(LS_STAGE, nextStage); setTab("home");
    } else if (tab === "weak_quiz") {
      setTab("weak_home");
    }
  }

  function handleMastered() {
    playNextSE();
    const ne = exprs.map(e=>e.id===quiz.expression.id?{...e,status:"習得済み"}:e);
    setExprs(ne); showToast("⭐ 習得済みに登録しました！");
    gasPost("updateStatus",{phrase:quiz.expression.phrase,status:"習得済み"}).catch(()=>{});
    if (batch.length >= BATCH_SIZE) setShowBatch(true);
    else pickQuiz(ne, tab);
  }

  function handleSpeak() {
    if (!quiz) return;
    setPlaying(true);
    speakText(quiz.type==="example_blank" || quiz.type==="speaking" ? quiz.expression.example : quiz.expression.phrase, ()=>setPlaying(false));
  }

  const handleSearch = (phrase) => {
    const query = encodeURIComponent(phrase + " 意味 使い方");
    const url = `www.google.com/search?q=${query}`;
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) window.location.href = `googlechromes://${url}`;
    else if (/android/i.test(ua)) window.location.href = `intent://${url}#Intent;scheme=https;package=com.android.chrome;end`;
    else window.open(`https://${url}`, "_blank");
  };

  const buyItem = (price) => {
    if(points >= price) {
      playPtSE();
      const np = points - price;
      setPoints(np); lsSet(LS_POINTS, np);
      showToast(`🎁 購入しました！ 残り ${np}pt`);
    }
  };

  const learned  = exprs.filter(e=>e.status==="習得済み");
  const weakList = exprs.filter(e=>e.status!=="習得済み" && e.attempts>0 && (e.correctCount/e.attempts)<0.7);

  if (!loaded) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:16}}>
      <div style={{width:40,height:40,border:"4px solid #E5E5E5",borderTopColor:"#58CC02",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <div style={{fontWeight:700,color:"#aaa",fontSize:15}}>データを読み込み中…</div>
    </div>
  );

  return (
    <div className="app">
      <div className={`toast${toast.on?" on":""}`}>{toast.msg}</div>
      <Confetti show={confetti}/>
      
      {loginBonusChar !== undefined && loginBonusChar !== null && (
        <LoginBonusModal unlockedChar={loginBonusChar} onClose={() => setLoginBonusChar(null)} />
      )}

      {showBatch && <BatchModal batch={batch} expressions={exprs} onContinue={handleBatchContinue} unlockedChars={unlockedChars}/>}

      {/* Header */}
      {tab !== "quiz" && tab !== "weak_quiz" && (
        <header className="top-header">
          <div style={{fontSize:20,fontWeight:900,color:"#222"}}>English Quiz</div>
          <div className="pts-badge">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#e5b400" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
            {points}
          </div>
        </header>
      )}

      {gasError&&<div className="banner err">❌ GAS接続エラー — キャッシュで動作中</div>}

      {/* ═══ HOME (通常マップ：5階層ごとの物理タワー) ════════════ */}
      {tab === "home" && (
        <div className="map-container">
          <div style={{textAlign:"center",marginBottom:20,padding:"0 20px",zIndex:10}}>
            <h2 style={{fontSize:22,fontWeight:900,color:"#333"}}>UNIT {Math.floor((normalStage-1)/10)+1}</h2>
            <p style={{fontSize:14,color:"var(--muted)",marginTop:4}}>スプレッドシートの単語をマスターしよう</p>
          </div>
          
          {unlockedChars.length > 0 && (
             <img src={CHARACTERS.find(c=>c.id===unlockedChars[0])?.url} className="floating-char" style={{top:"20%", left:"10%"}} />
          )}
          {unlockedChars.length > 1 && (
             <img src={CHARACTERS.find(c=>c.id===unlockedChars[1])?.url} className="floating-char" style={{top:"50%", right:"10%", animationDelay:"1s"}} />
          )}

          <div className="map-path">
            <div className="map-line">
              <div className="map-line-fill" style={{height: `${((normalStage - 1) % 5) * 25}%`}}/>
            </div>
            {[...Array(5)].map((_, i) => {
              const startNode = Math.floor((normalStage - 1) / 5) * 5 + 1;
              const nodeStage = startNode + i;
              const isCurrent = nodeStage === normalStage;
              const isCleared = nodeStage < normalStage;
              const shift = (nodeStage % 2 === 0) ? "30px" : "-30px";
              
              return (
                <div key={nodeStage} className="node-wrap" style={{transform: `translateX(${shift})`}}>
                  {isCurrent && <div className="map-start-btn" onClick={() => startSession("quiz")}>START</div>}
                  <div className={`map-node ${isCurrent ? 'current' : isCleared ? 'cleared' : 'locked'}`} onClick={() => isCurrent ? startSession("quiz") : null}>
                    {isCleared ? <Icons.Check/> : <Icons.Star/>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ═══ WEAK HOME ════════════ */}
      {tab === "weak_home" && (
        <div className="map-container" style={{background:"#fff5f5"}}>
          <div style={{textAlign:"center",marginBottom:20,padding:"0 20px"}}>
            <h2 style={{fontSize:22,fontWeight:900,color:"var(--red)"}}>苦手克服タワー</h2>
            <p style={{fontSize:14,color:"var(--muted)",marginTop:4}}>残りの苦手な表現：<strong>{exprs.filter(e=>e.status!=="習得済み"&&e.attempts>0&&(e.correctCount/e.attempts)<0.7).length}個</strong></p>
          </div>
          
          {exprs.filter(e=>e.status!=="習得済み"&&e.attempts>0&&(e.correctCount/e.attempts)<0.7).length === 0 ? (
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px",textAlign:"center",gap:14}}>
              <div style={{fontSize:56}}>✨</div><div style={{fontSize:20,fontWeight:900}}>タワー崩壊！</div><div style={{fontSize:14,color:"var(--muted)",lineHeight:1.75}}>素晴らしい定着率です！</div>
            </div>
          ) : (
            <div className="map-path">
              <div className="map-line" style={{background:"#ffcccc"}}><div className="map-line-fill" style={{background:"var(--red)", height:"0%"}}/></div>
              {[...Array(Math.max(1, Math.ceil(exprs.filter(e=>e.status!=="習得済み"&&e.attempts>0&&(e.correctCount/e.attempts)<0.7).length / BATCH_SIZE)))].map((_, i, arr) => {
                const nodeStage = arr.length - i; const isCurrent = nodeStage === 1; const shift = (nodeStage % 2 === 0) ? "30px" : "-30px";
                return (
                  <div key={nodeStage} className="node-wrap" style={{transform: `translateX(${shift})`}}>
                    {isCurrent && <div className="map-start-btn weak" onClick={() => startSession("weak_quiz")}>CHALLENGE!</div>}
                    <div className={`map-node ${isCurrent ? 'weak' : 'locked'}`} onClick={() => isCurrent ? startSession("weak_quiz") : null}><Icons.Alert/></div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ═══ QUIZ ＆ WEAK TAB ════════════ */}
      {(tab==="quiz" || tab==="weak_quiz")&&(
        <div className="scroll" style={{paddingBottom: 40}}>
          <div style={{display:"flex", alignItems:"center", padding:"10px 16px 0", position:"relative"}}>
            <button onPointerDown={handleQuitQuiz} style={{background:"#eee", border:"none", borderRadius:"50%", width:"32px", height:"32px", cursor:"pointer", color:"var(--muted)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:10, touchAction:"manipulation"}}>
              <Icons.Close style={{fontSize:"16px"}}/>
            </button>
            <div style={{position:"absolute", left:0, right:0, display:"flex", justifyContent:"center"}}>
              <div className="bdots">
                {Array.from({length:BATCH_SIZE},(_,i)=>{
                  const ans = batch[i]; return <div key={i} className={`bdot${ans?(ans.correct?" ok":" ng"):""}`}/>;
                })}
              </div>
            </div>
          </div>

          {quiz ? (
            <>
              <div className="qcard">
                <div className={`qbadge ${quiz.type==="multiple_choice"?"mc":quiz.type==="fill_blank"?"fb":quiz.type==="meaning_match"?"mm":quiz.type==="listening"?"ls":(quiz.type==="writing"||quiz.type==="original_writing")?"wr":"ex"}`}>
                  {quiz.type==="multiple_choice"&&"✦ 選択クイズ"}
                  {quiz.type==="fill_blank"&&"✦ 穴埋めクイズ"}
                  {quiz.type==="meaning_match"&&"✦ 意味マッチング"}
                  {quiz.type==="listening"&&"🎧 リスニング"}
                  {quiz.type==="example_blank"&&"📝 例文穴埋め"}
                  {quiz.type==="writing"&&"✍️ タイピング問題"}
                  {quiz.type==="original_writing"&&"✍️ 自分で作る"}
                  {quiz.type==="speaking"&&"🗣️ スピーキング"}
                </div>
                
                <div className="qquestion">{quiz.question}</div>
                
                {/* 既存の問題タイプ */}
                {(quiz.type==="multiple_choice"||quiz.type==="original_writing")&&<div className="qphrase">"{quiz.expression.phrase}"</div>}
                {quiz.type==="fill_blank"&&<><div className="blank-box">{quiz.phrase}</div><div className="sub-info">{quiz.subInfo}</div></>}
                {(quiz.type==="meaning_match"||quiz.type==="writing"||quiz.type==="original_writing")&&<div className="mhint">💬 {quiz.meaningHint}</div>}
                {quiz.type==="listening"&&<button className={`speak-btn${playing?" playing":""}`} onClick={handleSpeak}><Icons.Speaker/>{playing?"再生中…":"タップして音声を再生"}</button>}
                {quiz.type==="writing"&&<div style={{fontSize:"12px",color:"var(--muted)",marginLeft:14}}>※フレーズ全体を正しく入力してください</div>}
                {quiz.type==="example_blank"&&<><div className="ex-sentence">{quiz.exampleBlanked}</div><div className="ex-ja">🇯🇵 {quiz.exampleJa}</div></>}
                
                {/* スピーキング問題 */}
                {quiz.type==="speaking"&&<>
                  <div className="ex-sentence" style={{fontSize:"18px",background:"#f0f8ff",borderColor:"#bce0fd"}}>{quiz.expression.example}</div>
                  <div className="ex-ja" style={{marginBottom:16}}>🇯🇵 {quiz.expression.exampleJa}</div>
                  <button className={`speak-btn${playing?" playing":""}`} onClick={handleSpeak}><Icons.Speaker/>{playing?"再生中…":"お手本を聴く"}</button>
                </>}
              </div>

              {/* 回答エリア */}
              {quiz.type === "writing" ? (
                <form className="write-form" onSubmit={e=>{ e.preventDefault(); if(inputVal.trim() && selected===null) handleAnswer(inputVal); }}>
                  <input className="write-input" type="text" value={inputVal} onChange={e=>setInputVal(e.target.value)} disabled={selected!==null} placeholder="英語フレーズを入力..." autoFocus/>
                  <button className="btn-submit-write" type="submit" disabled={selected!==null || !inputVal.trim()}>回答</button>
                </form>
              ) : quiz.type === "original_writing" ? (
                !showSelfCheck ? (
                  <form className="write-form" onSubmit={e=>{ e.preventDefault(); if(inputVal.trim()) setShowSelfCheck(true); }}>
                    <textarea className="write-input" value={inputVal} onChange={e=>setInputVal(e.target.value)} placeholder="例: I tried to learn programming, but I bit off more than I could chew." />
                    <button className="btn-submit-write" type="submit" disabled={!inputVal.trim()}>解答例と見比べる</button>
                  </form>
                ) : (
                  <div className="opts">
                    <div style={{padding:"16px", background:"#fff5f0", borderRadius:"12px", marginBottom:"8px", fontSize:"15px", fontWeight:700}}>
                      <div style={{fontSize:"11px",color:"#888",marginBottom:"4px"}}>あなたの解答</div>
                      <div style={{marginBottom:"12px"}}>{inputVal}</div>
                      <div style={{fontSize:"11px",color:"var(--bd)",marginBottom:"4px"}}>模範解答例</div>
                      <div>{quiz.expression.example}</div>
                      <div style={{fontSize:"12px",color:"var(--muted)",marginTop:"4px"}}>{quiz.expression.exampleJa}</div>
                    </div>
                    <button className="opt ok" onClick={()=>handleSelfGrade(true)} disabled={!!selected} style={{textAlign:"center",background:"var(--blue)!important",color:"#fff!important",borderColor:"var(--bd)!important"}}><Icons.Check/> 正しく書けた（意味が通る）</button>
                    <button className="opt ng" onClick={()=>handleSelfGrade(false)} disabled={!!selected} style={{textAlign:"center"}}><Icons.Cross/> 全然書けなかった</button>
                  </div>
                )
              ) : quiz.type === "speaking" ? (
                <div className="opts" style={{gap:"12px"}}>
                  <button className="opt ok" onClick={()=>handleSelfGrade(true)} disabled={!!selected} style={{textAlign:"center",background:"var(--green)!important",color:"#fff!important",borderColor:"var(--gd)!important"}}><Icons.Mic/> スムーズに言えた！</button>
                  <button className="opt ng" onClick={()=>handleSelfGrade(false)} disabled={!!selected} style={{textAlign:"center"}}><Icons.Cross/> つっかえてしまった</button>
                  {!selected && <button className="skip-btn" onClick={handleSkipSpeaking}>この問題をスキップ（別問題へ）</button>}
                </div>
              ) : (
                <div className="opts">
                  {quiz.options.map((opt,i)=>{
                    let cls="opt";
                    if(selected){ if(opt.toLowerCase()===quiz.answer.toLowerCase()) cls+=" ok"; else if(opt===selected) cls+=" ng"; else cls+=" locked"; }
                    return <button key={i} className={cls} onClick={()=>handleAnswer(opt)} disabled={!!selected}>{opt}</button>;
                  })}
                </div>
              )}

              {/* フィードバック */}
              {showFB && quiz.type !== "original_writing" && quiz.type !== "speaking" && (
                <div className={`fdbk ${isCorrect?"ok":"ng"}`}>
                  <div className="fdbk-ttl">{isCorrect?<><Icons.Check/> 正解！</>:<><Icons.Cross/> 不正解…</>}</div>
                  <div className="fdbk-body">
                    {quiz.type==="writing" && !isCorrect ? <><span style={{color:"var(--rd)",textDecoration:"line-through"}}>入力: {selected}</span><br/><span style={{color:"var(--gd)",fontSize:"15px"}}>正解: <strong>{quiz.expression.phrase}</strong> <MiniSpeaker text={quiz.expression.phrase}/></span></> : <span><strong>{quiz.expression.phrase}</strong> <MiniSpeaker text={quiz.expression.phrase}/></span>}
                    <br/>{quiz.expression.meaning}
                  </div>
                  <div className="fdbk-ex">
                    📖 {quiz.expression.example} <MiniSpeaker text={quiz.expression.example}/><br/>🇯🇵 {quiz.expression.exampleJa}
                  </div>
                </div>
              )}

              <div className="btns">
                {selected&&(
                  <>
                    <button className={`btn ${batch.length >= BATCH_SIZE ? "btn-result" : "btn-next"}`} onClick={handleNext}>
                      {batch.length >= BATCH_SIZE ? "結果を見る →" : "次の問題へ →"}
                    </button>
                    <button className="btn btn-master" onClick={handleMastered}><Icons.Star/> この表現はもう覚えた！</button>
                  </>
                )}
                <div className="btn-link-wrap">
                  <button className="btn-src" onClick={()=>window.open(quiz.expression.url,"_blank")}><Icons.Link/> 動画を見る</button>
                  <button className="btn-src" onClick={()=>handleSearch(quiz.expression.phrase)}><Icons.Search/> Webで検索</button>
                </div>
              </div>
            </>
          ):null}
        </div>
      )}

      {/* ═══ SHOP TAB ════════════ */}
      {tab==="shop"&&(
        <div className="scroll" style={{padding:"20px 16px"}}>
          <div style={{fontSize:22,fontWeight:900,marginBottom:20}}>🏪 ご褒美ショップ</div>
          <div className="shop-item">
            <div className="shop-icon">🍫</div>
            <div className="shop-info">
              <div className="shop-name">コンビニでお菓子を買う</div>
              <div className="shop-price">600 pt</div>
            </div>
            <button className="btn-buy" onClick={()=>buyItem(600)} disabled={points<600}>交換</button>
          </div>
          <div className="shop-item">
            <div className="shop-icon">🍰</div>
            <div className="shop-info">
              <div className="shop-name">コンビニでケーキを買う</div>
              <div className="shop-price">1000 pt</div>
            </div>
            <button className="btn-buy" onClick={()=>buyItem(1000)} disabled={points<1000}>交換</button>
          </div>
          <div className="shop-item">
            <div className="shop-icon">☕</div>
            <div className="shop-info">
              <div className="shop-name">カフェでちょっと休憩</div>
              <div className="shop-price">1500 pt</div>
            </div>
            <button className="btn-buy" onClick={()=>buyItem(1500)} disabled={points<1500}>交換</button>
          </div>
        </div>
      )}

      {/* ═══ COLLECTION (図鑑) TAB ════════════ */}
      {tab==="collection"&&(
        <div className="scroll" style={{padding:"20px 0"}}>
          <div style={{padding:"0 20px", marginBottom:10}}>
            <div style={{fontSize:22,fontWeight:900}}>📖 イラスト図鑑</div>
            <div style={{fontSize:13,color:"var(--muted)",marginTop:4}}>集めたイラスト：{unlockedChars.length} / {CHARACTERS.length}</div>
          </div>
          
          <div className="col-grid">
            {CHARACTERS.map(char => {
              const isUnlocked = unlockedChars.includes(char.id);
              const count = charCounts[char.id] || 0;
              return (
                <div key={char.id} className="col-item">
                  <img src={char.url} className={`col-img ${!isUnlocked ? 'locked' : ''}`} alt={char.name} onError={(e)=>e.target.style.display='none'}/>
                  <div className="col-name">{isUnlocked ? char.name : "???"}</div>
                  <div className="col-count">{isUnlocked ? `登場回数: ${count}回` : "未獲得"}</div>
                </div>
              )
            })}
          </div>
        </div>
      )}

      {/* ═══ LEARNED TAB ════════════ */}
      {tab==="learned"&&(
        <div className="scroll">
          <div className="ll-hdr"><div className="ll-title">⭐ 習得済みリスト</div><div className="ll-sub">「戻す」で未学習に復元できます</div></div>
          {learned.length===0?(
            <div style={{padding:"60px 24px",textAlign:"center"}}><div style={{fontSize:48,marginBottom:14}}>🌱</div><div style={{fontSize:15,color:"var(--muted)",fontWeight:600,lineHeight:1.75}}>まだ習得済みの表現がありません。</div></div>
          ):(
            <div className="ll-list">
              {learned.map(expr=>{
                return (
                  <div key={expr.id} className="ll-item">
                    <div className="ll-icon"><Icons.Star/></div>
                    <div className="ll-body"><div className="ll-phrase">{expr.phrase} <MiniSpeaker text={expr.phrase}/></div><div className="ll-meaning">{expr.meaning.split("。")[0]}</div><div className="ll-ex">{expr.example}</div></div>
                    <button className="btn-restore" onClick={()=>handleRestore(expr.id)}><Icons.Refresh/> 戻す</button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Bottom Nav */}
      {(tab === "home" || tab === "weak_home" || tab === "shop" || tab === "collection" || tab === "learned") && (
        <nav className="nav">
          <button className={`ntab${tab==="home"?" on":""}`} onClick={()=>setTab("home")}><Icons.Map/> ステージ</button>
          <button className={`ntab${tab==="weak_home"?" on":""}`} onClick={()=>setTab("weak_home")}>
            <div style={{position:"relative"}}><Icons.Alert/>{weakList.length > 0 && <span style={{position:"absolute",top:-8,right:-12}} className="badge-red">{weakList.length}</span>}</div>苦手
          </button>
          <button className={`ntab${tab==="learned"?" on":""}`} onClick={()=>setTab("learned")}><Icons.Star/> 習得</button>
          <button className={`ntab${tab==="shop"?" on":""}`} onClick={()=>setTab("shop")}><Icons.Shop/> ショップ</button>
          <button className={`ntab${tab==="collection"?" on":""}`} onClick={()=>setTab("collection")}><Icons.Book/> 図鑑</button>
        </nav>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
