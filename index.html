<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SE試聴ツール</title>
  <style>
    body { font-family: 'Nunito', sans-serif; background: #f5f5f5; color: #333; padding: 20px; max-width: 500px; margin: 0 auto; }
    h1 { font-size: 20px; text-align: center; margin-bottom: 30px; }
    .theme-card { background: #fff; padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .theme-title { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: #1CB0F6; }
    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
    button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; color: #fff; transition: transform 0.1s; }
    button:active { transform: translateY(2px); }
    .btn-ng { background: #FF4B4B; box-shadow: 0 4px 0 #c73434; }
    .btn-next { background: #1CB0F6; box-shadow: 0 4px 0 #0d8fc9; }
    .btn-pt { background: #FFC800; color: #5a3f00; box-shadow: 0 4px 0 #e5b400; }
  </style>
</head>
<body>

  <h1>🎵 効果音（SE）試聴ツール</h1>
  <p style="font-size: 14px; text-align: center; color: #666; margin-bottom: 20px;">
    スマホのサイレントモードを解除して、ボタンを押してみてください。
  </p>

  <div class="theme-card">
    <div class="theme-title">① ポップ＆カジュアル（ゲーム風）</div>
    <div class="btn-group">
      <button class="btn-ng" onclick="playPopNg()">不正解</button>
      <button class="btn-next" onclick="playPopNext()">次へ</button>
      <button class="btn-pt" onclick="playPopPt()">Pt獲得</button>
    </div>
  </div>

  <div class="theme-card">
    <div class="theme-title">② マイルド＆癒やし系（夜向け）</div>
    <div class="btn-group">
      <button class="btn-ng" onclick="playMildNg()">不正解</button>
      <button class="btn-next" onclick="playMildNext()">次へ</button>
      <button class="btn-pt" onclick="playMildPt()">Pt獲得</button>
    </div>
  </div>

  <div class="theme-card">
    <div class="theme-title">③ 8-bitレトロ（ファミコン風）</div>
    <div class="btn-group">
      <button class="btn-ng" onclick="playRetroNg()">不正解</button>
      <button class="btn-next" onclick="playRetroNext()">次へ</button>
      <button class="btn-pt" onclick="playRetroPt()">Pt獲得</button>
    </div>
  </div>

  <script>
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    function createTone(freq, type, startTime, duration, volStart, volEnd) {
      if (ctx.state === 'suspended') ctx.resume();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime + startTime);
      gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
      gain.gain.linearRampToValueAtTime(volStart, ctx.currentTime + startTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(volEnd, ctx.currentTime + startTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + startTime);
      osc.stop(ctx.currentTime + startTime + duration);
    }

    // --- ① ポップ＆カジュアル ---
    function playPopNg() {
      createTone(150, 'square', 0, 0.15, 0.1, 0.01);
      createTone(120, 'square', 0.1, 0.2, 0.1, 0.01);
    }
    function playPopNext() {
      createTone(880, 'sine', 0, 0.1, 0.1, 0.01);
      createTone(1108.73, 'sine', 0.08, 0.15, 0.1, 0.01);
    }
    function playPopPt() {
      createTone(523.25, 'sine', 0, 0.1, 0.1, 0.01);
      createTone(659.25, 'sine', 0.1, 0.1, 0.1, 0.01);
      createTone(783.99, 'sine', 0.2, 0.1, 0.1, 0.01);
      createTone(1046.50, 'sine', 0.3, 0.4, 0.1, 0.01);
    }

    // --- ② マイルド＆癒やし系 ---
    function playMildNg() {
      createTone(300, 'sine', 0, 0.3, 0.15, 0.01);
      createTone(250, 'sine', 0.15, 0.4, 0.15, 0.01);
    }
    function playMildNext() {
