<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Quiz (最新版)</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --green: #4caf50; --gpale: #e8f5e9; --gd: #2e7d32;
      --red: #f44336; --rd: #c62828;
    }
    body { 
      font-family: 'Helvetica Neue', Arial, sans-serif; 
      padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f9f9f9;
    }
    .opt {
      display: block; width: 100%; padding: 15px; margin: 10px 0;
      font-size: 16px; font-weight: bold; border: 2px solid #ddd; 
      border-radius: 8px; background: #fff; cursor: pointer; 
      transition: 0.2s; text-align: left;
    }
    .opt:hover:not(:disabled) { background: #f0f0f0; }
    .opt.ok { border-color: var(--green) !important; background: var(--gpale) !important; color: var(--gd) !important; box-shadow: 0 3px 0 var(--gd) !important; }
    .opt.ng { border-color: var(--red) !important; background: #ffe5e5 !important; color: var(--rd) !important; box-shadow: 0 3px 0 var(--rd) !important; animation: shake .3s; }
    .opt:disabled { cursor: default; }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // 💡 キャッシュ突破確認用：コンソールにメッセージを出します
    console.log("【確認用】最新版のコードが正しく読み込まれました！Babelエラーは出ないはずです。");

    const { useState, useEffect } = React;

    function App() {
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [selected, setSelected] = useState(null);
      const [score, setScore] = useState(0);
      const [loading, setLoading] = useState(true);
      const [isFinished, setIsFinished] = useState(false);

      const GAS_URL = "ここにGASのURLを貼り付けます";

      useEffect(() => {
        const fetchQuiz = async () => {
          try {
            if (GAS_URL.startsWith("http")) {
              const response = await fetch(GAS_URL);
              const data = await response.json();
              setQuestions(data);
            } else {
              setQuestions([
                { question: "apple", options: ["りんご", "みかん", "ばなな", "ぶどう"], answer: "りんご" },
                { question: "dog", options: ["ねこ", "いぬ", "とり", "うさぎ"], answer: "いぬ" },
                { question: "computer", options: ["机", "時計", "計算機", "電子計算機"], answer: "電子計算機" }
              ]);
            }
            setLoading(false);
          } catch (error) {
            console.error("データ取得エラー:", error);
            setLoading(false);
          }
        };
        fetchQuiz();
      }, []);

      const handleAnswer = (option) => {
        setSelected(option);
        const currentQ = questions[currentIndex];
        if (option === currentQ.answer) setScore(score + 1);

        setTimeout(() => {
          setSelected(null);
          if (currentIndex + 1 < questions.length) setCurrentIndex(currentIndex + 1);
          else setIsFinished(true);
        }, 1000); 
      };

      if (loading) return <div>問題を読み込み中...</div>;
      if (isFinished) return (
        <div style={{ textAlign: "center", marginTop: "50px" }}>
          <h2>クイズ終了！🎉</h2>
          <p style={{ fontSize: "1.2rem" }}>{questions.length}問中、<strong>{score}</strong>問正解です！</p>
          <button onClick={() => window.location.reload()} style={{ padding: "10px 20px", marginTop: "20px", cursor: "pointer" }}>もう一度プレイ</button>
        </div>
      );
      if (questions.length === 0) return <div>問題データがありません。</div>;

      const currentQ = questions[currentIndex];

      return (
        <div>
          <p style={{ color: "#666" }}>問題 {currentIndex + 1} / {questions.length}</p>
          <h1 style={{ fontSize: "2.5rem", margin: "20px 0", textAlign: "center" }}>{currentQ.question}</h1>
          
          <div>
            {currentQ.options.map((option, index) => {
              let btnClass = "opt";
              if (selected) {
                if (option === currentQ.answer) btnClass += " ok";
                else if (option === selected) btnClass += " ng";
              }
              return (
                <button 
                  key={index} className={btnClass}
                  onClick={() => handleAnswer(option)} disabled={selected !== null}
                >
                  {option}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
