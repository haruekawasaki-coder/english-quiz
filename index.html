<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>英語学習クイズ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --green:#58CC02;--gd:#46a302;--gpale:#d7f5b1;
      --blue:#1CB0F6;--bd:#0d8fc9;
      --red:#FF4B4B;--rd:#c73434;
      --yellow:#FFC800;--yd:#e5b400;
      --bg:#F5F5F5;--card:#FFF;--text:#2D2D2D;
      --muted:#888;--border:#E5E5E5;--r:16px;
    }
    html,body{height:100%;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);}
    #root{height:100%;}
    .app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg);}
    /* Nav */
    .nav{background:var(--card);border-bottom:2px solid var(--border);display:flex;position:sticky;top:0;z-index:100;}
    .ntab{flex:1;padding:13px 8px 11px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:800;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:3px solid transparent;transition:all .2s;}
    .ntab.on{color:var(--green);border-bottom-color:var(--green);}
    /* Progress */
    .prog-wrap{padding:12px 16px 6px;}
    .prog-label{font-size:11px;font-weight:700;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:5px;}
    .prog-row{display:flex;align-items:center;gap:10px;}
    .prog-bar{flex:1;height:12px;background:var(--border);border-radius:99px;overflow:hidden;}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#6dd5fa);border-radius:99px;transition:width .5s cubic-bezier(.34,1.56,.64,1);}
    .prog-pct{font-size:13px;font-weight:900;color:var(--blue);min-width:36px;text-align:right;}
    /* Batch dots */
    .bdots{display:flex;gap:5px;justify-content:center;padding:6px 16px 2px;}
    .bdot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background .25s,transform .25s;}
    .bdot.ok{background:var(--green);}
    .bdot.ng{background:var(--red);}
    .bdot.cur{background:var(--blue);transform:scale(1.25);}
    /* Quiz card */
    .qcard{margin:8px 16px 10px;background:var(--card);border-radius:var(--r);border:2px solid var(--border);box-shadow:0 5px 0 var(--border);padding:20px 18px 16px;}
    .qbadge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;border-radius:99px;padding:3px 12px;margin-bottom:10px;}
    .qbadge.mc{background:#d7f5b1;color:#3a9100;}
    .qbadge.fb{background:#ddeeff;color:var(--bd);}
    .qbadge.mm{background:#f0e0ff;color:#9340c8;}
    .qbadge.ls{background:#fff3cd;color:#8a6200;}
    .qbadge.ex{background:#ffe4e4;color:#c73434;}
    .qquestion{font-size:15px;font-weight:700;margin-bottom:8px;line-height:1.5;}
    .qphrase{font-size:23px;font-weight:900;margin:4px 0 6px;line-height:1.25;}
    .blank-box{font-size:18px;font-weight:800;background:#f0f0f0;border-radius:10px;padding:10px 14px;margin:4px 0 6px;line-height:1.5;}
    .sub-info{margin-top:8px;padding:10px 13px;background:#f7f7f7;border-radius:10px;font-size:12px;color:var(--muted);font-style:italic;line-height:1.6;}
    .mhint{margin-top:6px;padding:11px 14px;background:#f7f7f7;border-radius:12px;font-size:14px;font-weight:600;line-height:1.65;}
    .ex-sentence{margin-top:6px;padding:12px 14px;background:#fff5f0;border:2px solid #ffd6c0;border-radius:12px;font-size:15px;font-weight:700;line-height:1.65;}
    .ex-ja{margin-top:5px;font-size:12px;color:var(--muted);font-style:italic;line-height:1.55;}
    /* Speaker */
    .speak-btn{display:flex;align-items:center;justify-content:center;gap:10px;margin:12px auto 0;width:85%;padding:16px;border:3px solid var(--yellow);border-radius:var(--r);background:#fffbf0;cursor:pointer;font-family:inherit;font-size:15px;font-weight:800;color:#8a6200;box-shadow:0 4px 0 var(--yd);-webkit-tap-highlight-color:transparent;transition:transform .12s,box-shadow .12s;}
    .speak-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--yd);}
    .speak-btn.playing{background:var(--yellow);animation:spulse 1s infinite;}
    @keyframes spulse{0%,100%{box-shadow:0 4px 0 var(--yd)}50%{box-shadow:0 4px 0 var(--yd),0 0 0 8px rgba(255,200,0,.22)}}
    /* Options */
    .opts{display:flex;flex-direction:column;gap:8px;margin:8px 16px 0;}
    .opt{border:2.5px solid var(--border);border-radius:var(--r);padding:13px 18px;background:var(--card);font-family:inherit;font-size:15px;font-weight:700;color:var(--text);cursor:pointer;text-align:left;transition:border-color .15s,background .15s;box-shadow:0 3px 0 var(--border);-webkit-tap-highlight-color:transparent;outline:none;}
    @media(hover:hover)and(pointer:fine){.opt:hover:not(:disabled):not(.ok):not(.ng){border-color:var(--blue);background:#f0faff;}}
    .opt.ok{border-color:var(--green)!important;background:var(--gpale)!important;color:var(--gd)!important;box-shadow:0 3px 0 var(--gd)!important;}
    .opt.ng{border-color:var(--red)!important;background:#ffe5e5!important;color:var(--rd)!important;box-shadow:0 3px 0 var(--rd)!important;animation:shake .3s;}
    .opt:disabled{cursor:default;}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    /* Feedback */
    .fdbk{margin:10px 16px 0;border-radius:var(--r);padding:13px 16px;border:2px solid;animation:sup .28s cubic-bezier(.34,1.56,.64,1);}
    .fdbk.ok{background:var(--gpale);border-color:var(--green);}
    .fdbk.ng{background:#ffe5e5;border-color:var(--red);}
    .fdbk-ttl{font-size:15px;font-weight:900;display:flex;align-items:center;gap:6px;margin-bottom:5px;}
    .fdbk.ok .fdbk-ttl{color:var(--gd);}
    .fdbk.ng .fdbk-ttl{color:var(--rd);}
    .fdbk-body{font-size:13px;line-height:1.65;}
    .fdbk-ex{margin-top:6px;font-size:12px;color:var(--muted);font-style:italic;line-height:1.6;border-top:1px solid rgba(0,0,0,.08);padding-top:6px;}
    .cum-row{display:flex;align-items:center;gap:7px;margin-top:9px;padding-top:8px;border-top:1px solid rgba(0,0,0,.09);}
    .cum-label{font-size:10px;font-weight:700;color:var(--muted);white-space:nowrap;}
    .cum-bar-wrap{flex:1;height:6px;background:rgba(0,0,0,.1);border-radius:99px;overflow:hidden;}
    .cum-bar{height:100%;border-radius:99px;transition:width .8s ease;}
    .cum-pct{font-size:12px;font-weight:900;min-width:30px;text-align:right;}
    .cum-count{font-size:10px;color:var(--muted);}
    @keyframes sup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    /* Buttons */
    .btns{padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
    .btn{border:none;border-radius:var(--r);padding:15px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;transition:transform .12s,box-shadow .12s;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn-next{background:var(--green);color:#fff;box-shadow:0 4px 0 var(--gd);}
    .btn-next:active{transform:translateY(2px);box-shadow:0 2px 0 var(--gd);}
    .btn-master{background:var(--yellow);color:#5a3f00;box-shadow:0 4px 0 var(--yd);}
    .btn-master:active{transform:translateY(2px);box-shadow:0 2px 0 var(--yd);}
    @media(hover:hover)and(pointer:fine){
      .btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--gd);}
      .btn-master:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--yd);}
    }
    .btn-src{background:none;border:2px solid var(--border);border-radius:var(--r);padding:11px;font-family:inherit;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent;}
    /* Bottom stats */
    .stats-bar{background:var(--card);border-top:2px solid var(--border);padding:8px 10px 10px;display:flex;align-items:stretch;position:sticky;bottom:0;z-index:100;}
    .sdiv{width:1px;background:var(--border);margin:4px 0;}
    .schip{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 2px;}
    .schip.tap{cursor:pointer;border-radius:10px;transition:background .15s;}
    .schip.tap:active{background:#f0f0f0;}
    .snum{font-size:18px;font-weight:900;line-height:1;}
    .snum.b{color:var(--blue);}
    .snum.m{color:var(--muted);}
    .snum.y{color:var(--yd);}
    .slbl{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:3px;}
    .tap-hint{font-size:8px;color:#ccc;margin-top:1px;}
    .sbatch{flex:1.4;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 2px;}
    /* Toast */
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-90px);background:#1a1a1a;color:#fff;padding:12px 22px;border-radius:99px;font-size:14px;font-weight:700;z-index:9999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;}
    .toast.on{transform:translateX(-50%) translateY(0);}
    /* Learned list */
    .ll-hdr{padding:16px 16px 8px;}
    .ll-title{font-size:21px;font-weight:900;}
    .ll-sub{font-size:13px;color:var(--muted);margin-top:2px;}
    .ll-list{padding:4px 16px 120px;display:flex;flex-direction:column;gap:9px;}
    .ll-item{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:13px;display:flex;align-items:flex-start;gap:11px;box-shadow:0 3px 0 var(--border);}
    .ll-icon{width:34px;height:34px;background:var(--gpale);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--green);font-size:15px;flex-shrink:0;margin-top:2px;}
    .ll-body{flex:1;min-width:0;}
    .ll-phrase{font-size:15px;font-weight:800;}
    .ll-meaning{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5;}
    .ll-ex{font-size:11px;color:#bbb;font-style:italic;margin-top:3px;line-height:1.5;}
    .ll-acc{display:flex;align-items:center;gap:6px;margin-top:6px;}
    .ll-bar-wrap{flex:1;height:5px;background:var(--border);border-radius:99px;overflow:hidden;}
    .ll-bar{height:100%;border-radius:99px;}
    .btn-restore{border:2px solid var(--border);border-radius:10px;padding:7px 11px;background:none;font-family:inherit;font-size:12px;font-weight:800;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
    .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    /* Confetti */
    @keyframes cfFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(250px) rotate(720deg)}}
    /* Spinner */
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Banner */
    .banner{padding:10px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;}
    .banner.warn{background:#fff3cd;border-bottom:2px solid #ffc107;color:#856404;}
    .banner.err{background:#ffe5e5;border-bottom:2px solid var(--red);color:var(--rd);}
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ════════════════════════════════════════════════════════════
//  GAS Web App URL
// ════════════════════════════════════════════════════════════
const GAS_URL = "https://script.google.com/macros/s/AKfycbwu8KtiWduIE_Bp9OSYP0DoUIvc8WTeF660uWqLOuOCCu6dn8BjqFzJrYvUmYl8hhhpMQ/exec";

// ─────────────────────────────────────────────────────────────
//  GAS通信ヘルパー
// ─────────────────────────────────────────────────────────────
async function gasGet(params) {
  const url = GAS_URL + "?" + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}
async function gasPost(action, data) {
  const body = new URLSearchParams({ action, data: JSON.stringify(data) });
  const res = await fetch(GAS_URL, { method:"POST", body });
  return res.json();
}

// ─────────────────────────────────────────────────────────────
//  localStorage 永続化（キャッシュクリアのため v2 に更新）
// ─────────────────────────────────────────────────────────────
const LS_EXPRS = "quiz-exprs-v2";
const LS_TOTAL = "quiz-total-v2";
function lsGet(key) { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

// ─────────────────────────────────────────────────────────────
//  ダミーデータ（GAS未接続時のフォールバック）
// ─────────────────────────────────────────────────────────────
const DUMMY = [
  { id:1,  phrase:"break the ice",            meaning:"場を和ませる・打ち解けること",    example:"He told a joke to break the ice.",            exampleJa:"彼は場を和ませるために冗談を言った。",  url:"https://youtube.com", status:"未学習", attempts:0, correctCount:0 },
  { id:2,  phrase:"hit the nail on the head", meaning:"的を射る・ズバリ言い当てる",      example:"You hit the nail on the head.",               exampleJa:"まさにその通りです。",                 url:"https://youtube.com", status:"未学習", attempts:0, correctCount:0 },
  { id:3,  phrase:"under the weather",        meaning:"体調が悪い・気分がすぐれない",    example:"I'm feeling under the weather today.",        exampleJa:"今日は体調が悪い。",                     url:"https://youtube.com", status:"学習中", attempts:4, correctCount:3 },
  { id:4,  phrase:"bite the bullet",          meaning:"歯を食いしばって頑張る",          example:"Just bite the bullet and do it.",             exampleJa:"歯を食いしばってやるしかない。",        url:"https://youtube.com", status:"未学習", attempts:0, correctCount:0 },
  { id:5,  phrase:"piece of cake",            meaning:"朝飯前・超簡単なこと",            example:"The test was a piece of cake.",               exampleJa:"そのテストは朝飯前だった。",            url:"https://youtube.com", status:"未学習", attempts:0, correctCount:0 },
  { id:6,  phrase:"spill the beans",          meaning:"秘密をバラす・うっかり漏らす",    example:"Don't spill the beans!",                      exampleJa:"秘密を漏らさないで！",                  url:"https://youtube.com", status:"未学習", attempts:2, correctCount:1 },
  { id:7,  phrase:"once in a blue moon",      meaning:"滅多に〜ない",                    example:"She visits once in a blue moon.",             exampleJa:"彼女は滅多に来ない。",                  url:"https://youtube.com", status:"習得済み",attempts:6, correctCount:5 },
  { id:8,  phrase:"see eye to eye",           meaning:"意見が一致する",                  example:"We don't always see eye to eye.",             exampleJa:"いつも意見が合うわけではない。",        url:"https://youtube.com", status:"未学習", attempts:0, correctCount:0 },
  { id:9,  phrase:"burn the midnight oil",    meaning:"夜遅くまで働く・徹夜する",        example:"She burned the midnight oil to finish.",      exampleJa:"彼女は徹夜で仕上げた。",               url:"https://youtube.com", status:"学習中", attempts:3, correctCount:2 },
  { id:10, phrase:"go the extra mile",        meaning:"一層の努力をする",                example:"She always goes the extra mile.",             exampleJa:"彼女はいつも一層の努力をする。",        url:"https://youtube.com", status:"未学習", attempts:0, correctCount:0 },
];

// ─────────────────────────────────────────────────────────────
//  Speech Synthesis
// ─────────────────────────────────────────────────────────────
function speakText(text, onEnd) {
  if (!window.speechSynthesis) { onEnd?.(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US"; u.rate = 0.82;
  if (onEnd) u.onend = onEnd;
  const go = () => {
    const v = window.speechSynthesis.getVoices();
    const en = v.find(x => x.lang.startsWith("en-US")) || v.find(x => x.lang.startsWith("en"));
    if (en) u.voice = en;
    window.speechSynthesis.speak(u);
  };
  window.speechSynthesis.getVoices().length ? go() : (window.speechSynthesis.onvoiceschanged = go);
}

// ─────────────────────────────────────────────────────────────
//  Quiz Generator（5種類・重複なし）
// ─────────────────────────────────────────────────────────────
const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

function buildOptions(correct, pool) {
  const seen = new Set([correct]);
  const opts = [correct];
  for (const c of shuffle(pool)) {
    if (!seen.has(c) && opts.length < 4) { seen.add(c); opts.push(c); }
    if (opts.length === 4) break;
  }
  return shuffle(opts);
}

function blankify(sentence, phrase) {
  return sentence.replace(
    new RegExp(phrase.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"), "i"),
    "【    】"
  );
}

function generateQuiz(expression, all) {
  const others = all.filter(e => e.id !== expression.id);
  const types  = ["multiple_choice","fill_blank","meaning_match","listening","example_blank"];
  const type   = types[Math.floor(Math.random() * types.length)];

  if (type === "multiple_choice") {
    const correct = expression.meaning.split("・")[0].split("。")[0];
    return { type, question:`"${expression.phrase}" の意味は？`,
             subInfo:`例) ${expression.example}`,
             options: buildOptions(correct, others.map(e=>e.meaning.split("・")[0].split("。")[0])),
             answer: correct, expression };
  }
  if (type === "fill_blank") {
    const words = expression.phrase.split(" ");
    const bi    = Math.floor(Math.random() * words.length);
    return { type, question:"空欄に入る単語を選んでください",
             phrase: words.map((w,i) => i===bi ? "【  】" : w).join(" "),
             subInfo:`例) ${expression.example}`,
             options: buildOptions(words[bi], others.flatMap(e=>e.phrase.split(" "))),
             answer: words[bi], expression };
  }
  if (type === "meaning_match") {
    return { type, question:"次の意味に合う英語表現はどれ？",
             meaningHint: expression.meaning.split("。")[0],
             options: buildOptions(expression.phrase, others.map(e=>e.phrase)),
             answer: expression.phrase, expression };
  }
  if (type === "listening") {
    return { type, question:"🎧 音声を聞いて、正しい英語表現を選んでください",
             options: buildOptions(expression.phrase, others.map(e=>e.phrase)),
             answer: expression.phrase, expression };
  }
  // example_blank
  return { type:"example_blank", question:"例文の【    】に入るフレーズは？",
           exampleBlanked: blankify(expression.example, expression.phrase),
           exampleJa: expression.exampleJa,
           options: buildOptions(expression.phrase, others.map(e=>e.phrase)),
           answer: expression.phrase, expression };
}

// ─────────────────────────────────────────────────────────────
//  Icons（SVG）
// ─────────────────────────────────────────────────────────────
const CheckIc   = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{width:"1em",height:"1em"}}><polyline points="20 6 9 17 4 12"/></svg>;
const CrossIc   = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{width:"1em",height:"1em"}}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
const StarIc    = () => <svg viewBox="0 0 24 24" fill="currentColor" style={{width:"1em",height:"1em"}}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
const BookIc    = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:"1em",height:"1em"}}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>;
const LinkIc    = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:"1em",height:"1em"}}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;
const RefreshIc = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:"1em",height:"1em"}}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.1"/></svg>;
const SpeakerIc = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:"1.5em",height:"1.5em"}}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>;

// ─────────────────────────────────────────────────────────────
//  Confetti
// ─────────────────────────────────────────────────────────────
function Confetti({ show }) {
  if (!show) return null;
  const C = ["#58CC02","#FFC800","#1CB0F6","#CE82FF","#FF4B4B","#FF9600"];
  const dots = Array.from({length:28},(_,i)=>({
    id:i, color:C[i%C.length],
    left:Math.random()*100, top:Math.random()*35+5,
    w:Math.random()*10+4, h:Math.random()*14+5, delay:Math.random()*0.5
  }));
  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:9998,overflow:"hidden"}}>
      {dots.map(d=>(
        <div key={d.id} style={{position:"absolute",left:`${d.left}%`,top:`${d.top}%`,
          width:d.w,height:d.h,background:d.color,borderRadius:2,
          animation:`cfFall 1.1s ease-in ${d.delay}s forwards`}}/>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
//  Accuracy Ring
// ─────────────────────────────────────────────────────────────
function Ring({ pct, size=50, stroke=5, color="#58CC02" }) {
  const r=size/2-stroke, circ=2*Math.PI*r, off=circ-(pct/100)*circ;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E5E5" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
        style={{transition:"stroke-dashoffset .7s ease"}}/>
    </svg>
  );
}

// ─────────────────────────────────────────────────────────────
//  10問バッチ結果モーダル
// ─────────────────────────────────────────────────────────────
function BatchModal({ batch, expressions, onContinue }) {
  const correctN = batch.filter(b=>b.correct).length;
  const pct = Math.round(correctN/batch.length*100);
  const [emoji,hl] = pct>=80?["🏆","素晴らしい！完璧に近い！"]:pct>=60?["🎯","いい調子！続けよう！"]:pct>=40?["💪","もう少し！頑張れ！"]:["📚","しっかり復習しよう！"];
  const rc = pct>=60?"#58CC02":pct>=40?"#FFC800":"#FF4B4B";
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
      <div style={{background:"#fff",borderRadius:24,padding:"28px 22px 24px",width:"100%",maxWidth:430,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 28px 70px rgba(0,0,0,.35)"}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:800,color:"#aaa",letterSpacing:".06em",textTransform:"uppercase",marginBottom:8}}>10問セット 結果</div>
          <div style={{fontSize:44,margin:"4px 0"}}>{emoji}</div>
          <div style={{fontSize:13,fontWeight:700,color:"#999",marginBottom:6}}>このセットの正答率</div>
          <div style={{position:"relative",display:"inline-flex",alignItems:"center",justifyContent:"center",margin:"4px 0 6px"}}>
            <Ring pct={pct} size={108} stroke={9} color={rc}/>
            <div style={{position:"absolute",textAlign:"center"}}>
              <div style={{fontSize:26,fontWeight:900,color:"#2D2D2D",lineHeight:1}}>{pct}%</div>
              <div style={{fontSize:11,fontWeight:700,color:"#bbb"}}>{correctN}/{batch.length}問</div>
            </div>
          </div>
          <div style={{fontSize:19,fontWeight:900,color:rc,marginTop:4}}>{hl}</div>
        </div>
        <div style={{height:1,background:"#EFEFEF",margin:"0 0 18px"}}/>
        <div style={{fontSize:12,fontWeight:800,color:"#bbb",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>今回の表現 ＆ 累計正答率</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {batch.map((b,i)=>{
            const expr = expressions.find(e=>e.id===b.expressionId);
            if(!expr) return null;
            const cp = expr.attempts>0?Math.round(expr.correctCount/expr.attempts*100):0;
            const cc = cp>=70?"#58CC02":cp>=40?"#FFC800":"#FF4B4B";
            return (
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,
                background:b.correct?"#f3fff0":"#fff4f4",
                border:`2px solid ${b.correct?"#58CC02":"#FF4B4B"}`,
                borderRadius:14,padding:"10px 13px"}}>
                <div style={{color:b.correct?"#46a302":"#c73434",fontSize:18,flexShrink:0}}>
                  {b.correct?<CheckIc/>:<CrossIc/>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:800,fontSize:14,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{expr.phrase}</div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginTop:5}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#bbb",whiteSpace:"nowrap"}}>累計</div>
                    <div style={{flex:1,height:5,background:"#E5E5E5",borderRadius:99,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${cp}%`,background:cc,borderRadius:99}}/>
                    </div>
                    <div style={{fontSize:11,fontWeight:900,color:cc,minWidth:30,textAlign:"right"}}>{cp}%</div>
                    <div style={{fontSize:10,color:"#ccc",whiteSpace:"nowrap"}}>({expr.attempts}回)</div>
                  </div>
                </div>
                <div style={{position:"relative",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <Ring pct={cp} size={44} stroke={4} color={cc}/>
                  <span style={{position:"absolute",fontSize:9,fontWeight:900,color:"#2D2D2D"}}>{cp}%</span>
                </div>
              </div>
            );
          })}
        </div>
        <button onClick={onContinue} style={{marginTop:22,width:"100%",border:"none",borderRadius:16,padding:"16px",background:"#58CC02",color:"#fff",fontFamily:"inherit",fontSize:16,fontWeight:800,cursor:"pointer",boxShadow:"0 4px 0 #46a302"}}>
          続ける →
        </button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
//  ステータスリストモーダル
// ─────────────────────────────────────────────────────────────
function StatusListModal({ status, expressions, onClose }) {
  const list = expressions.filter(e=>e.status===status);
  const isL  = status==="学習中";
  const ac   = isL?"#1CB0F6":"#888";
  const bg   = isL?"#ddeeff":"#f0f0f0";
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:8000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,maxHeight:"80vh",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"20px 20px 12px",borderBottom:"1px solid #EFEFEF",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{background:bg,color:ac,fontWeight:800,fontSize:12,borderRadius:99,padding:"2px 12px"}}>{status}</span>
              <span style={{fontSize:20,fontWeight:900,color:"#2D2D2D"}}>{list.length}件</span>
            </div>
          </div>
          <button onClick={onClose} style={{border:"none",background:"#f0f0f0",borderRadius:"50%",width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#888"}}>
            <CloseIc/>
          </button>
        </div>
        <div style={{overflowY:"auto",padding:"12px 16px 40px",display:"flex",flexDirection:"column",gap:8}}>
          {list.length===0
            ? <div style={{textAlign:"center",padding:"40px",color:"#aaa",fontSize:14}}>{status}の表現はありません</div>
            : list.map(expr=>{
              const cp = expr.attempts>0?Math.round(expr.correctCount/expr.attempts*100):null;
              const cc = cp==null?"#ccc":cp>=70?"#58CC02":cp>=40?"#FFC800":"#FF4B4B";
              return (
                <div key={expr.id} style={{background:"#fff",border:"2px solid #EFEFEF",borderRadius:14,padding:"12px 14px"}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:800}}>{expr.phrase}</div>
                      <div style={{fontSize:12,color:"#888",marginTop:3,lineHeight:1.5}}>{expr.meaning.split("。")[0]}</div>
                      <div style={{fontSize:11,color:"#bbb",fontStyle:"italic",marginTop:3}}>{expr.example}</div>
                    </div>
                    {cp!==null&&(
                      <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                        <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
                          <Ring pct={cp} size={40} stroke={4} color={cc}/>
                          <span style={{position:"absolute",fontSize:9,fontWeight:900,color:"#2D2D2D"}}>{cp}%</span>
                        </div>
                        <div style={{fontSize:9,color:"#bbb"}}>{expr.attempts}回</div>
                      </div>
                    )}
                  </div>
                </div>
              );
            })
          }
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
//  Main App
// ─────────────────────────────────────────────────────────────
const BATCH_SIZE = 10;

function App() {
  const [loaded,        setLoaded]        = useState(false);
  const [gasError,      setGasError]      = useState(false);
  const [tab,           setTab]           = useState("quiz");
  const [exprs,         setExprs]         = useState([]);
  const [quiz,          setQuiz]          = useState(null);
  const [selected,      setSelected]      = useState(null);
  const [isCorrect,     setIsCorrect]     = useState(null);
  const [showFB,        setShowFB]        = useState(false);
  const [playing,       setPlaying]       = useState(false);
  const [confetti,      setConfetti]      = useState(false);
  const [toast,         setToast]         = useState({ msg:"", on:false });
  const [batch,         setBatch]         = useState([]);
  const [showBatch,     setShowBatch]     = useState(false);
  const [totalAnswered, setTotalAnswered] = useState(0);
  const [statusModal,   setStatusModal]   = useState(null);

  const exprsRef = useRef(exprs);
  exprsRef.current = exprs;

  // 起動時：GAS → localStorage → ダミーの順で読み込む
  useEffect(() => {
    const savedTotal = lsGet(LS_TOTAL) || 0;
    setTotalAnswered(savedTotal);

    gasGet({ action:"getExpressions" })
      .then(({ expressions }) => {
        const data = (expressions && expressions.length) ? expressions : (lsGet(LS_EXPRS) || DUMMY);
        setExprs(data);
        lsSet(LS_EXPRS, data);
        const pool = data.filter(e=>e.status!=="習得済み");
        if (pool.length) setQuiz(generateQuiz(pool[Math.floor(Math.random()*pool.length)], data));
        setLoaded(true);
      })
      .catch(() => {
        setGasError(true);
        const cached = lsGet(LS_EXPRS) || DUMMY;
        setExprs(cached);
        const pool = cached.filter(e=>e.status!=="習得済み");
        if (pool.length) setQuiz(generateQuiz(pool[Math.floor(Math.random()*pool.length)], cached));
        setLoaded(true);
      });
  }, []);

  // exprs変化のたびlocalStorageに保存
  useEffect(() => {
    if (exprs.length) lsSet(LS_EXPRS, exprs);
  }, [exprs]);

  const pickQuiz = useCallback((list) => {
    const pool = list.filter(e=>e.status!=="習得済み");
    if (!pool.length) { setQuiz(null); return; }
    const expr = pool[Math.floor(Math.random()*pool.length)];
    setQuiz(generateQuiz(expr, list));
    setSelected(null); setIsCorrect(null); setShowFB(false); setPlaying(false);
  }, []);

  function showToast(msg) {
    setToast({ msg, on:true });
    setTimeout(()=>setToast(t=>({...t,on:false})), 2200);
  }

  function handleAnswer(option) {
    if (selected || !quiz) return;
    const correct = option === quiz.answer;
    setSelected(option); setIsCorrect(correct); setShowFB(true);
    if (correct) { setConfetti(true); setTimeout(()=>setConfetti(false),1300); }

    const newExprs = exprs.map(e => {
      if (e.id!==quiz.expression.id) return e;
      return { ...e,
        attempts: e.attempts+1,
        correctCount: e.correctCount+(correct?1:0),
        status: e.status==="未学習"&&correct ? "学習中" : e.status
      };
    });
    setExprs(newExprs);
    gasPost("updateStats", { phrase:quiz.expression.phrase, correct }).catch(()=>{});

    const nb = [...batch, { expressionId:quiz.expression.id, correct }];
    const nt = totalAnswered+1;
    setBatch(nb);
    setTotalAnswered(nt);
    lsSet(LS_TOTAL, nt);
    if (nb.length>=BATCH_SIZE) setTimeout(()=>setShowBatch(true),500);
  }

  function handleNext() { pickQuiz(exprsRef.current); }

  function handleMastered() {
    const ne = exprs.map(e=>e.id===quiz.expression.id?{...e,status:"習得済み"}:e);
    setExprs(ne);
    showToast("⭐ 習得済みに登録しました！");
    gasPost("updateStatus",{phrase:quiz.expression.phrase,status:"習得済み"}).catch(()=>{});
    pickQuiz(ne);
  }

  function handleRestore(id) {
    const target = exprs.find(e=>e.id===id);
    setExprs(prev=>prev.map(e=>e.id===id?{...e,status:"未学習"}:e));
    showToast("↩ 未学習に戻しました");
    if (target) gasPost("updateStatus",{phrase:target.phrase,status:"未学習"}).catch(()=>{});
  }

  function handleBatchContinue() {
    setShowBatch(false); setBatch([]); pickQuiz(exprsRef.current);
  }

  function handleSpeak() {
    if (!quiz) return;
    setPlaying(true);
    speakText(quiz.type==="example_blank"?quiz.expression.example:quiz.expression.phrase, ()=>setPlaying(false));
  }

  const learned       = exprs.filter(e=>e.status==="習得済み");
  const active        = exprs.filter(e=>e.status!=="習得済み");
  const masteredN     = learned.length;
  const learningN     = exprs.filter(e=>e.status==="学習中").length;
  const unlearnedN    = exprs.filter(e=>e.status==="未学習").length;
  const batchN        = batch.length;
  const batchCorrectN = batch.filter(b=>b.correct).length;
  const batchProgPct  = Math.round((batchN/BATCH_SIZE)*100);
  const curExpr  = quiz?exprs.find(e=>e.id===quiz.expression.id):null;
  const cumPct   = curExpr&&curExpr.attempts>0?Math.round(curExpr.correctCount/curExpr.attempts*100):null;
  const cumColor = cumPct==null?"#ccc":cumPct>=70?"var(--green)":cumPct>=40?"var(--yellow)":"var(--red)";

  if (!loaded) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:16,fontFamily:"'Nunito',sans-serif"}}>
      <div style={{width:40,height:40,border:"4px solid #E5E5E5",borderTopColor:"#58CC02",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <div style={{fontWeight:700,color:"#aaa",fontSize:15}}>データを読み込み中…</div>
    </div>
  );

  return (
    <div className="app">
      <div className={`toast${toast.on?" on":""}`}>{toast.msg}</div>
      <Confetti show={confetti}/>
      {showBatch&&<BatchModal batch={batch} expressions={exprs} onContinue={handleBatchContinue}/>}
      {statusModal&&<StatusListModal status={statusModal} expressions={exprs} onClose={()=>setStatusModal(null)}/>}

      {gasError&&<div className="banner err">❌ GAS接続エラー — キャッシュ/ダミーデータで動作中</div>}

      {/* Nav */}
      <nav className="nav">
        <button className={`ntab${tab==="quiz"?" on":""}`} onClick={()=>setTab("quiz")}>
          <BookIc/> クイズ
        </button>
        <button className={`ntab${tab==="learned"?" on":""}`} onClick={()=>setTab("learned")}>
          <StarIc/> 習得済み
          {masteredN>0&&<span style={{background:"var(--yellow)",color:"#5a3f00",borderRadius:99,padding:"1px 7px",fontSize:11,fontWeight:900}}>{masteredN}</span>}
        </button>
      </nav>

      {/* ═══ QUIZ TAB ══════════════════════════════════════════════ */}
      {tab==="quiz"&&(
        <div className="scroll">
          <div className="prog-wrap">
            <div className="prog-label">
              <span>このセットの進捗</span>
              <span style={{color:"var(--blue)",fontWeight:900}}>{batchN} / {BATCH_SIZE} 問</span>
            </div>
            <div className="prog-row">
              <div className="prog-bar"><div className="prog-fill" style={{width:`${batchProgPct}%`}}/></div>
              <div className="prog-pct">{batchProgPct}%</div>
            </div>
          </div>
          <div className="bdots">
            {Array.from({length:BATCH_SIZE},(_,i)=>{
              const ans=batch[i]; let cls="bdot";
              if(ans) cls+=ans.correct?" ok":" ng"; else if(i===batchN) cls+=" cur";
              return <div key={i} className={cls}/>;
            })}
          </div>

          {active.length===0?(
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 24px",textAlign:"center",gap:14}}>
              <div style={{fontSize:56}}>🎉</div>
              <div style={{fontSize:20,fontWeight:900}}>全部習得完了！</div>
              <div style={{fontSize:14,color:"var(--muted)",lineHeight:1.75}}>すべての表現を習得しました。<br/>「習得済み」タブから未学習に戻せます。</div>
            </div>
          ):quiz?(
            <>
              <div className="qcard">
                <div className={`qbadge ${quiz.type==="multiple_choice"?"mc":quiz.type==="fill_blank"?"fb":quiz.type==="meaning_match"?"mm":quiz.type==="listening"?"ls":"ex"}`}>
                  {quiz.type==="multiple_choice"&&"✦ 選択クイズ"}
                  {quiz.type==="fill_blank"&&"✦ 穴埋めクイズ"}
                  {quiz.type==="meaning_match"&&"✦ 意味マッチング"}
                  {quiz.type==="listening"&&"🎧 リスニング"}
                  {quiz.type==="example_blank"&&"📝 例文穴埋め"}
                </div>
                <div className="qquestion">{quiz.question}</div>
                {quiz.type==="multiple_choice"&&<><div className="qphrase">"{quiz.expression.phrase}"</div><div className="sub-info">{quiz.subInfo}</div></>}
                {quiz.type==="fill_blank"&&<><div className="blank-box">{quiz.phrase}</div><div className="sub-info">{quiz.subInfo}</div></>}
                {quiz.type==="meaning_match"&&<div className="mhint">💬 {quiz.meaningHint}</div>}
                {quiz.type==="listening"&&(
                  <button className={`speak-btn${playing?" playing":""}`} onClick={handleSpeak}>
                    <SpeakerIc/>{playing?"再生中…":"タップして音声を再生"}
                  </button>
                )}
                {quiz.type==="example_blank"&&(
                  <><div className="ex-sentence">{quiz.exampleBlanked}</div><div className="ex-ja">🇯🇵 {quiz.exampleJa}</div></>
                )}
              </div>

              <div className="opts">
                {quiz.options.map((opt,i)=>{
                  let cls="opt";
                  if(selected){ if(opt===quiz.answer) cls+=" ok"; else if(opt===selected) cls+=" ng"; }
                  return <button key={i} className={cls} onClick={()=>handleAnswer(opt)} disabled={!!selected}>{opt}</button>;
                })}
              </div>

              {showFB&&(
                <div className={`fdbk ${isCorrect?"ok":"ng"}`}>
                  <div className="fdbk-ttl">{isCorrect?<><CheckIc/> 正解！素晴らしい！</>:<><CrossIc/> 不正解…</>}</div>
                  <div className="fdbk-body"><strong>{quiz.expression.phrase}</strong><br/>{quiz.expression.meaning}</div>
                  <div className="fdbk-ex">📖 {quiz.expression.example}<br/>🇯🇵 {quiz.expression.exampleJa}</div>
                  {curExpr&&curExpr.attempts>0&&(
                    <div className="cum-row">
                      <div className="cum-label">この表現の累計正答率</div>
                      <div className="cum-bar-wrap"><div className="cum-bar" style={{width:`${cumPct}%`,background:cumColor}}/></div>
                      <div className="cum-pct" style={{color:cumColor}}>{cumPct}%</div>
                      <div className="cum-count">({curExpr.attempts}回)</div>
                    </div>
                  )}
                </div>
              )}

              <div className="btns">
                {selected&&(
                  <>
                    <button className="btn btn-next" onClick={handleNext}>次の問題へ →</button>
                    <button className="btn btn-master" onClick={handleMastered}><StarIc/> この表現はもう覚えた！</button>
                  </>
                )}
                <button className="btn-src" onClick={()=>window.open(quiz.expression.url,"_blank")}><LinkIc/> ソース動画を見る</button>
              </div>
            </>
          ):null}
        </div>
      )}

      {/* ═══ LEARNED TAB ══════════════════════════════════════════ */}
      {tab==="learned"&&(
        <div className="scroll">
          <div className="ll-hdr">
            <div className="ll-title">⭐ 習得済みリスト</div>
            <div className="ll-sub">「戻す」で未学習に復元できます</div>
          </div>
          {learned.length===0?(
            <div style={{padding:"60px 24px",textAlign:"center"}}>
              <div style={{fontSize:48,marginBottom:14}}>🌱</div>
              <div style={{fontSize:15,color:"var(--muted)",fontWeight:600,lineHeight:1.75}}>
                まだ習得済みの表現がありません。<br/>クイズで「もう覚えた！」を押してみよう！
              </div>
            </div>
          ):(
            <div className="ll-list">
              {learned.map(expr=>{
                const cp=expr.attempts>0?Math.round(expr.correctCount/expr.attempts*100):0;
                const bc=cp>=70?"var(--green)":cp>=40?"var(--yellow)":"var(--red)";
                return (
                  <div key={expr.id} className="ll-item">
                    <div className="ll-icon"><StarIc/></div>
                    <div className="ll-body">
                      <div className="ll-phrase">{expr.phrase}</div>
                      <div className="ll-meaning">{expr.meaning.split("。")[0]}</div>
                      <div className="ll-ex">{expr.example}</div>
                      <div className="ll-acc">
                        <div style={{fontSize:10,fontWeight:700,color:"var(--muted)"}}>累計正答率</div>
                        <div className="ll-bar-wrap"><div className="ll-bar" style={{width:`${cp}%`,background:bc}}/></div>
                        <div style={{fontSize:11,fontWeight:900,color:bc}}>{cp}%</div>
                        <div style={{fontSize:10,color:"var(--muted)"}}>({expr.attempts}回)</div>
                      </div>
                    </div>
                    <button className="btn-restore" onClick={()=>handleRestore(expr.id)}><RefreshIc/> 戻す</button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ═══ BOTTOM STATS BAR ════════════════════════════════════ */}
      <div className="stats-bar">
        <div className="schip tap" onClick={()=>setStatusModal("学習中")}>
          <div className="snum b">{learningN}</div>
          <div className="slbl">学習中</div>
          <div className="tap-hint">▲ 一覧</div>
        </div>
        <div className="sdiv"/>
        <div className="schip tap" onClick={()=>setStatusModal("未学習")}>
          <div className="snum m">{unlearnedN}</div>
          <div className="slbl">未学習</div>
          <div className="tap-hint">▲ 一覧</div>
        </div>
        <div className="sdiv"/>
        <div className="sbatch">
          <div style={{display:"flex",alignItems:"baseline",gap:2}}>
            <span style={{fontSize:16,fontWeight:900,color:"var(--blue)"}}>{batchCorrectN}</span>
            <span style={{fontSize:12,fontWeight:700,color:"var(--muted)"}}>/{batchN}</span>
          </div>
          <div style={{fontSize:9,fontWeight:800,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".04em",marginTop:3}}>今回10問</div>
        </div>
        <div className="sdiv"/>
        <div className="schip">
          <div className="snum y">{totalAnswered}</div>
          <div className="slbl">累計解答</div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
